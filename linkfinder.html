<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (window.location.pathname.endsWith('/linkfinder.html')) {
      const params = window.location.search;
      window.location.replace('/?route=/links' + (params ? '&' + params.substring(1) : ''));
    }
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/_tokens.css" />
  <link rel="stylesheet" href="/css/linkfinder.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <title>Link Finder</title>
</head>
<body>

<div class="lf">
  <div class="lf-app">
    <div class="lf-content">
      <!-- Selector screen -->
      <div class="lf-selector" id="lf-selector">
        <div class="lf-selector-content">
          <h1>Link Finder</h1>
          <p>Select your school's blocker and we'll find a link that works for you.</p>

          <div class="lf-blocker-chips" id="lf-blocker-chips">
            <p class="lf-quick-label">What blocker does your school use?</p>
            <div class="lf-chips">
              <button class="lf-chip" data-blocker="fortiguard">FortiGuard</button>
              <button class="lf-chip" data-blocker="lightspeed">Lightspeed</button>
              <button class="lf-chip" data-blocker="palo alto">Palo Alto</button>
              <button class="lf-chip" data-blocker="blocksi web">Blocksi Web</button>
              <button class="lf-chip" data-blocker="blocksi ai">Blocksi AI</button>
              <button class="lf-chip" data-blocker="linewize">Linewize</button>
              <button class="lf-chip" data-blocker="cisco umbrella">Cisco Umbrella</button>
              <button class="lf-chip" data-blocker="securly">Securly</button>
              <button class="lf-chip" data-blocker="goguardian">GoGuardian</button>
              <button class="lf-chip" data-blocker="lanschool">LanSchool</button>
              <button class="lf-chip" data-blocker="contentkeeper">ContentKeeper</button>
              <button class="lf-chip" data-blocker="aristotlek12">AristotleK12</button>
              <button class="lf-chip" data-blocker="senso cloud">Senso Cloud</button>
              <button class="lf-chip" data-blocker="deledao">Deledao</button>
              <button class="lf-chip" data-blocker="iboss">iBoss</button>
              <button class="lf-chip" data-blocker="sophos">Sophos</button>
              <button class="lf-chip" data-blocker="barracuda">Barracuda</button>
              <button class="lf-chip" data-blocker="qustodio">Qustodio</button>
              <button class="lf-chip" data-blocker="dns filter">DNS Filter</button>
            </div>
          </div>

          <button class="lf-go-btn" id="lf-go-btn" disabled>
            <i class="fas fa-search"></i> Find Links
          </button>
        </div>
      </div>

      <!-- Results area — one link at a time -->
      <div class="lf-results" id="lf-results">
        <div class="lf-single-wrap">
          <div class="lf-single-top">
            <div class="lf-single-counter" id="lf-counter"></div>
            <h2 class="lf-single-title" id="lf-single-title"></h2>
            <div class="lf-single-badge" id="lf-single-badge"></div>
          </div>

          <div class="lf-single-mid" id="lf-single-mid">
            <a class="lf-big-link-btn" id="lf-big-link" href="#" target="_blank" rel="noopener noreferrer">
              <i class="fas fa-globe"></i>
              <span>Open Link</span>
            </a>
            <div class="lf-single-nav" id="lf-single-nav" style="display:none;">
              <button class="lf-nav-btn" id="lf-next-btn"><i class="fas fa-forward"></i> Try Another Link</button>
            </div>
          </div>

          <div class="lf-single-bottom">
            <p class="lf-results-usage" id="lf-results-usage"></p>
            <button class="lf-back-btn" id="lf-back-btn"><i class="fas fa-arrow-left"></i> Search Again</button>
          </div>
        </div>
      </div>

      <!-- Limit reached -->
      <div class="lf-limit" id="lf-limit">
        <div class="lf-limit-content">
          <i class="fas fa-clock lf-limit-icon"></i>
          <h2>Daily Limit Reached</h2>
          <p>You've used your <strong>3 searches</strong> for today. Come back tomorrow for more links!</p>
          <p class="lf-limit-reset" id="lf-limit-reset"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/config.js"></script>
<script src="/js/linkfinder.js"></script>

</body>
</html>
