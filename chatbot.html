  <script>
  (function(){
    if(window.NexoraChat) return;

    // ⚠️ REPLACE THIS WITH YOUR AWS LAMBDA API GATEWAY URL
    const LAMBDA_ENDPOINT = 'https://c1dzon32al.execute-api.us-east-2.amazonaws.com/default/Chatbot';

    const CHAT_STORAGE_KEY = 'nexora_chat_session';
    const MODE_STORAGE_KEY = 'nexora_ai_mode';
    const LIMIT_STORAGE_KEY = 'nexora_rate_limits_v1';
    let chatHistory = [];
    let lastUserPrompt = '';
    let currentMode = 'general';

    const AI_MODES = {
      general: {
        name: "Nexora AI",
        maxHistory: 10,
        systemPrompt: `You are Nexora AI, a sharp and versatile assistant. Be direct—answer what's asked, nothing more.

Formatting rules:
- Use **bold** for key terms and emphasis.
- Use headings (##, ###) to organize long answers into scannable sections.
- Use bullet lists for multiple points; numbered lists for sequential steps.
- ALWAYS wrap any code — including HTML, CSS, JS, or any markup — in fenced blocks with the language tag (e.g. \`\`\`html, \`\`\`js, \`\`\`css). Never output raw code as plain text.
- Use inline \`code\` for function names, variables, file paths, and terminal commands.
- Use > blockquotes for important callouts or warnings.
- Keep paragraphs short (2-4 sentences max).
- Use tables when comparing options or listing structured data.
- Never pad your response with filler, disclaimers, or unsolicited examples.`
      },
      coder: {
        name: "Nexora Code",
        maxHistory: 20,
        systemPrompt: `You are Nexora Code, a senior-level software engineer. Write production-quality code.

Principles:
- Default to the most idiomatic solution in the language being used.
- ALWAYS wrap code in fenced blocks with the language specified (\`\`\`html, \`\`\`js, \`\`\`css, etc.). Never output raw code as plain text.
- Add brief inline comments only where logic is non-obvious.
- When fixing bugs, pinpoint the root cause first, then show the fix.
- Prefer modern syntax and patterns (ES modules, async/await, f-strings, etc.).
- If a question is ambiguous, state your assumption in one line, then answer.
- For architecture questions, use bullet lists or tables, not walls of prose.
- Mention edge cases and potential pitfalls only when they're likely to matter.
- Never generate boilerplate, placeholder code, or examples the user didn't ask for.`
      },
      writing: {
        name: "Nexora Write",
        maxHistory: 20,
        systemPrompt: `You are Nexora Write, a skilled editor and writing coach with a sharp eye for clarity and rhythm.

Approach:
- When editing, show the revised text first, then briefly explain what you changed and why.
- Preserve the author's voice—improve clarity without flattening personality.
- Flag weak verbs, passive voice, redundancy, and vague language.
- For structural feedback, use headings and bullet points to organize your suggestions.
- Match the user's register: casual for casual, formal for formal.
- When drafting new text, ask about audience and purpose if not obvious—but only once.
- Use **bold** to highlight key edits or suggested phrases.
- Never rewrite more than the user asked you to. Don't volunteer sample paragraphs or templates unless requested.`
      },
      creative: {
        name: "Nexora Creative",
        maxHistory: 20,
        systemPrompt: `You are Nexora Creative, an imaginative collaborator who thrives on bold ideas.

Style:
- Lead with the most unexpected or compelling angle.
- Offer 2-3 distinct directions when brainstorming, each with a one-line pitch.
- Use vivid, sensory language—show, don't tell.
- For story/character work, focus on conflict, motivation, and specificity.
- For design or marketing, think about the target audience and emotional hook.
- Keep suggestions actionable—not just "what if" but "here's how."
- Use markdown formatting to separate ideas clearly (headings, bold, lists).
- Don't over-explain your creative choices unless asked. Let the work speak.`
      },
      math: {
        name: "Nexora Math",
        maxHistory: 10,
        systemPrompt: `You are Nexora Math, a precise and patient mathematics expert.

Rules:
- ALWAYS use LaTeX notation for mathematical expressions: inline math with $...$ and display math with $$...$$.
- Show complete, step-by-step solutions. Number each step.
- State the method or theorem you're applying at each step (e.g., "By the chain rule…").
- Clearly box or bold the final answer.
- When multiple approaches exist, present the cleanest one first; mention alternatives briefly.
- For proofs, use clear logical structure: Given → Show → Proof → QED.
- Define any non-standard notation before using it.
- If the problem is ambiguous, state your interpretation, solve it, then note alternatives.
- Never generate practice problems or examples unless the user asks for them.`
      },
      tutor: {
        name: "Nexora Tutor",
        maxHistory: 20,
        systemPrompt: `You are Nexora Tutor, a patient and adaptive teacher who makes complex ideas click.

Teaching approach:
- Start with the core concept in 1-2 plain sentences before going deeper.
- Use analogies tied to everyday things the user likely knows.
- Build up from simple to complex—don't skip steps even if they seem obvious.
- Use ### headings to break explanations into digestible sections.
- For STEM topics, include relevant formulas in LaTeX ($...$, $$...$$).
- For history/humanities, use chronological structure and highlight cause-and-effect.
- Ask a quick check-in question at the end ("Does that make sense?" or "Want me to go deeper on any part?").
- Adapt your depth based on the user's question—a simple question gets a simple answer.
- Don't assign homework, quizzes, or practice problems unless explicitly asked.`
      }
    };
    // Client-side rate limiting
    const RATE_LIMIT = {
      cooldownMs: 5000,    // time between sends
      perHour: 10,         // max requests per hour
      perDay: 30           // max requests per day
    };

    function now(){ return Date.now(); }

    function loadLimitState(){
      try{
        const raw = localStorage.getItem(LIMIT_STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      }catch{ return {}; }
    }

    function saveLimitState(state){
      try{ localStorage.setItem(LIMIT_STORAGE_KEY, JSON.stringify(state)); }catch{}
    }

    function resetIfWindowElapsed(state){
      const t = now();
      const oneHour = 3_600_000, oneDay = 86_400_000;
      // Initialize
      state.lastSendAt = state.lastSendAt || 0;
      state.hourStart = state.hourStart || t;
      state.dayStart = state.dayStart || t;
      state.hourCount = state.hourCount || 0;
      state.dayCount = state.dayCount || 0;
      if(t - state.hourStart   >= oneHour){ state.hourStart   = t; state.hourCount   = 0; }
      if(t - state.dayStart    >= oneDay ){ state.dayStart    = t; state.dayCount    = 0; }
      return state;
    }

    function isLocalhost(){
      const h = window.location.hostname;
      return h === '127.0.0.1' || h === 'localhost' || h === '::1';
    }

    function canSendNow(){
      if(isLocalhost()) return { ok: true, state: {}, reason: { cooldownOk: true, hourOk: true, dayOk: true } };
      const state = resetIfWindowElapsed(loadLimitState());
      const t = now();
      const cooldownOk = (t - (state.lastSendAt || 0)) >= RATE_LIMIT.cooldownMs;
      const hourOk   = state.hourCount   < RATE_LIMIT.perHour;
      const dayOk    = state.dayCount    < RATE_LIMIT.perDay;
      return { ok: cooldownOk && hourOk && dayOk, state, reason: { cooldownOk, hourOk, dayOk } };
    }

    function recordSend(){
      if(isLocalhost()) return;
      const state = resetIfWindowElapsed(loadLimitState());
      state.lastSendAt = now();
      state.hourCount++;
      state.dayCount++;
      saveLimitState(state);
    }

    function remainingLimits(){
      const state = resetIfWindowElapsed(loadLimitState());
      return {
        hourRemaining:   Math.max(0, RATE_LIMIT.perHour   - (state.hourCount   || 0)),
        dayRemaining:    Math.max(0, RATE_LIMIT.perDay    - (state.dayCount    || 0)),
        cooldownMsLeft:  Math.max(0, RATE_LIMIT.cooldownMs - (now() - (state.lastSendAt || 0)))
      };
    }


    // Lightweight client-side token optimization utilities
    const TOKEN_OPT = {
      // Hard caps to avoid overly long requests; adjust as needed
      maxUserChars: 4000,
      maxSystemChars: 1500,
      keepRecentTurns: 6, // keep last N messages verbatim
    };

    function truncateText(s, max){
      if(typeof s !== 'string') return s;
      if(s.length <= max) return s;
      // Prefer cutting on sentence boundary when possible
      const slice = s.slice(0, max);
      const lastPeriod = slice.lastIndexOf('.');
      if(lastPeriod > max * 0.6) return slice.slice(0, lastPeriod + 1) + '…';
      return slice.trim() + '…';
    }

    function compactMarkdown(s){
      if(!s) return s;
      let t = String(s);
      // Remove repeated whitespace
      t = t.replace(/[ \t]{2,}/g, ' ');
      // Collapse long blank lines
      t = t.replace(/\n{3,}/g, '\n\n');
      // Trim overly long code blocks by keeping header + first ~50 lines
      t = t.replace(/```([\s\S]*?)```/g, (m) => {
        const lines = m.split('\n');
        if(lines.length <= 60) return m; // keep small blocks
        const head = lines.slice(0, 55).join('\n');
        return head + '\n...\n```';
      });
      return t;
    }

    function summarizeTurn(text){
      // Very cheap heuristic summary: take first 1-2 sentences
      if(!text) return '';
      const s = text.replace(/\s+/g, ' ').trim();
      const parts = s.split(/(?<=[.!?])\s+/);
      return parts.slice(0, 2).join(' ');
    }

    function buildOptimizedMessages(systemPrompt, history, mode){
      const messages = [];
      // Compact and truncate system prompt
      const sys = truncateText(compactMarkdown(systemPrompt), TOKEN_OPT.maxSystemChars);
      messages.push({ role: 'system', content: sys });

      // Keep last N turns verbatim; earlier turns get summarized
      const keep = TOKEN_OPT.keepRecentTurns;
      const early = history.slice(0, Math.max(0, history.length - keep));
      const recent = history.slice(-keep);

      if(early.length){
        // Summarize earlier dialogue to reduce tokens
        const userSummaries = [];
        const assistantSummaries = [];
        early.forEach(msg => {
          if(msg.role === 'user') userSummaries.push('- ' + summarizeTurn(msg.text || msg.content));
          else if(msg.role === 'bot') assistantSummaries.push('- ' + summarizeTurn(msg.text || msg.content));
        });
        const summary = [
          'Context summary of earlier turns:',
          userSummaries.length ? 'User:' : '',
          ...userSummaries,
          assistantSummaries.length ? 'Assistant:' : '',
          ...assistantSummaries
        ].filter(Boolean).join('\n');
        messages.push({ role: 'system', content: truncateText(summary, 1200) });
      }

      // Add recent turns, compacted and truncated
      recent.forEach(msg => {
        const contentRaw = msg.text || msg.content || '';
        const compact = compactMarkdown(contentRaw);
        const limit = msg.role === 'user' ? TOKEN_OPT.maxUserChars : TOKEN_OPT.maxUserChars;
        const content = truncateText(compact, limit);
        if(msg.role === 'user') messages.push({ role: 'user', content });
        else messages.push({ role: 'assistant', content });
      });

      return messages;
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function formatLang(raw){
      if(!raw) return "Code";
      const lower = raw.toLowerCase();
      return lower.charAt(0).toUpperCase() + lower.slice(1);
    }

    function renderReplyWithCode(text){
      // Normalize line endings (CRLF → LF) so the code-block regex always matches
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const re = /```(\w+)?\n([\s\S]*?)```/g;
      let html = "";
      let last = 0;
      let m;
      while((m = re.exec(text)) !== null){
        const preText = text.slice(last, m.index).trim();
        if(preText) html += `<div class="bot-chunk">${formatMarkdown(preText)}</div>`;

        const langRaw = m[1] || "";
        const langLabel = formatLang(langRaw);
        const code = m[2];

        html += `
          <div class="code">
            <div class="code-header">
              <div class="code-dots" aria-hidden="true">
                <span class="code-dot"></span><span class="code-dot"></span><span class="code-dot"></span>
              </div>
              <span class="code-lang">${escapeHtml(langLabel)}</span>
              <button class="copy-btn" title="Copy code">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>Copy</span>
              </button>
            </div>
            <pre><code class="language-${escapeHtml(langRaw)}">${escapeHtml(code)}</code></pre>
          </div>
        `;
        last = re.lastIndex;
      }

      const postText = text.slice(last).trim();
      if(postText) html += `<div class="bot-chunk">${formatMarkdown(postText)}</div>`;

      return html;
    }

    function formatMarkdown(text){
      // 1. Protect LaTeX expressions from markdown/HTML processing
      const mathStore = [];
      function stash(match, type){
        const id = `NXMT${type}${mathStore.length}NXMT`;
        mathStore.push({ id, content: match });
        return id;
      }
      // Display math: $$...$$ and \[...\]
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, m => stash(m, 'D'));
      text = text.replace(/\\\[([\s\S]+?)\\\]/g, m => stash(m, 'D'));
      // Inline math: \(...\) and $...$
      text = text.replace(/\\\((.+?)\\\)/g, m => stash(m, 'I'));
      text = text.replace(/\$([^\$\n]+?)\$/g, m => stash(m, 'I'));

      // 2. Protect inline code spans
      const codeStore = [];
      text = text.replace(/`([^`]+)`/g, (m, code) => {
        const id = `NXCD${codeStore.length}NXCD`;
        codeStore.push({ id, code });
        return id;
      });

      // 3. Escape HTML on the remaining text
      let html = escapeHtml(text);

      // 4. Horizontal rules
      html = html.replace(/^(\-{3,}|\*{3,}|_{3,})$/gm, '<hr>');

      // 5. Headings (h1-h6)
      html = html.replace(/^#{6}\s+(.+)$/gm, '<h6>$1</h6>');
      html = html.replace(/^#{5}\s+(.+)$/gm, '<h5>$1</h5>');
      html = html.replace(/^#{4}\s+(.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

      // 6. Blockquotes (multi-line aware)
      html = html.replace(/^&gt;\s?(.+)$/gm, '<blockquote>$1</blockquote>');
      html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

      // 7. Tables – detect header separator row and apply <thead>/<tbody>
      html = html.replace(/(^\|.+\|\n)(^\|[\s\-:|]+\|\n)((?:^\|.+\|\n?)+)/gm, (m, hdr, sep, bodyRows) => {
        const parseRow = (row, tag) => {
          const cells = row.replace(/^\||\|$/g,'').split('|').map(c => c.trim());
          return '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
        };
        const thead = '<thead>' + parseRow(hdr.trim(), 'th') + '</thead>';
        const tbody = '<tbody>' + bodyRows.trim().split('\n').map(r => parseRow(r, 'td')).join('') + '</tbody>';
        return `<table>${thead}${tbody}</table>`;
      });
      // Fallback: simple table rows without separator
      html = html.replace(/^\|(.+)\|$/gm, (match, content) => {
        const cells = content.split('|').map(c => c.trim()).filter(Boolean);
        if(cells.every(c => /^[\-:]+$/.test(c))) return '';
        return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
      });
      html = html.replace(/(<tr>.*?<\/tr>\s*)+/g, match => {
        if(match.includes('<table>')) return match;
        return `<table>${match}</table>`;
      });

      // 8. Inline formatting
      html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/_(.+?)_/g, '<em>$1</em>');

      // 9. Images and links
      html = html.replace(/!\[([^\]]*)\]\(([^\)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
      html = html.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      // 10. Lists – unordered
      html = html.replace(/^[\-\*\+]\s+(.+)$/gm, '<li>$1</li>');
      // Lists – ordered
      html = html.replace(/^\d+\.\s+(.+)$/gm, '<li class="ol-item">$1</li>');
      // Wrap consecutive <li> into <ul>
      html = html.replace(/(<li>(?:(?!<li class)[\s\S])*?<\/li>(?:\s*<li>(?:(?!<li class)[\s\S])*?<\/li>)*)/g, match => {
        if(match.includes('ol-item')) return match;
        return `<ul>${match}</ul>`;
      });
      // Wrap consecutive <li class="ol-item"> into <ol>
      html = html.replace(/(<li class="ol-item">.*?<\/li>\s*)+/g, match => {
        return `<ol>${match.replace(/ class="ol-item"/g, '')}</ol>`;
      });
      // Checkboxes
      html = html.replace(/<li>\[ \]\s*(.+)<\/li>/g, '<li class="task"><input type="checkbox" disabled> $1</li>');
      html = html.replace(/<li>\[x\]\s*(.+)<\/li>/gi, '<li class="task done"><input type="checkbox" disabled checked> $1</li>');

      // 11. Paragraphs: convert double-newlines to paragraph breaks, single to <br>
      html = html.replace(/\n{2,}/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');
      // Wrap in <p> tags if we created paragraph breaks
      if(html.includes('</p><p>')) html = '<p>' + html + '</p>';
      // Clean up empty paragraphs
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>(<h[1-6]>)/g, '$1');
      html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ul>|<ol>|<table>|<blockquote>|<hr>)/g, '$1');
      html = html.replace(/(<\/ul>|<\/ol>|<\/table>|<\/blockquote>)<\/p>/g, '$1');

      // 11b. Strip stray <br> adjacent to block elements — the main cause of double-spacing
      html = html.replace(/<br>\s*(<(?:h[1-6]|ul|ol|li|table|thead|tbody|tr|blockquote|hr)[\s>])/gi, '$1');
      html = html.replace(/(<\/(?:h[1-6]|ul|ol|li|table|tbody|blockquote)>)\s*<br>/gi, '$1');
      html = html.replace(/<p>\s*(<br>\s*)+/g, '<p>');
      html = html.replace(/(\s*<br>)+\s*<\/p>/g, '</p>');

      // 12. Restore inline code spans
      codeStore.forEach(({ id, code }) => {
        html = html.replace(new RegExp(id, 'g'), `<code>${escapeHtml(code)}</code>`);
      });

      // 13. Restore LaTeX expressions
      mathStore.forEach(({ id, content }) => {
        html = html.replace(new RegExp(id, 'g'), content);
      });

      return html;
    }

    function getEls(root){
      root = root && root.querySelector ? root : document;
      return {
        containerRoot: root,
        scrollEl: root.querySelector ? root.querySelector("#scroll") : document.querySelector("#scroll"),
        introEl: root.querySelector ? root.querySelector("#intro") : document.querySelector("#intro"),
        promptEl: root.querySelector ? root.querySelector("#prompt") : document.querySelector("#prompt"),
        sendEl: root.querySelector ? root.querySelector("#send") : document.querySelector("#send")
      };
    }

    function openBubbleEditor(userBubble, botWrap, root){
      if(!userBubble) return;
      if(userBubble._nexoraEditing) return;

      const rootEl = root && root.querySelector ? root : document;
      const currentSendEl = rootEl.querySelector('#send');
      const originalText = userBubble.textContent.trim();

      userBubble._nexoraEditing = true;
      userBubble.classList.add('editing');
      userBubble.textContent = '';

      const textarea = document.createElement('textarea');
      textarea.className = 'bubble-editor';
      textarea.value = originalText;

      const btnRow = document.createElement('div');
      btnRow.className = 'bubble-editor-btns';

      const saveBtn = document.createElement('button');
      saveBtn.className = 'bubble-editor-save';
      saveBtn.textContent = 'Send';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'bubble-editor-cancel';
      cancelBtn.textContent = 'Cancel';

      function closeEditor(text){
        while(userBubble.firstChild) userBubble.removeChild(userBubble.firstChild);
        userBubble.textContent = text;
        userBubble._nexoraEditing = false;
        userBubble.classList.remove('editing');
      }

      function cancelEdit(e){
        if(e){ e.stopPropagation(); e.preventDefault(); }
        closeEditor(originalText);
      }

      let submitted = false;
      function submitEdit(e){
        if(e){ e.stopPropagation(); e.preventDefault(); }
        if(submitted) return;
        const newText = textarea.value.trim();
        if(!newText){ cancelEdit(e); return; }
        submitted = true;
        saveBtn.disabled = true;
        cancelBtn.disabled = true;

        closeEditor(newText);
        lastUserPrompt = newText;

        if(chatHistory.length && chatHistory[chatHistory.length-1].role === 'bot') chatHistory.pop();
        if(chatHistory.length && chatHistory[chatHistory.length-1].role === 'user') chatHistory.pop();
        chatHistory.push({ role: 'user', content: newText, text: newText });
        saveChatHistory();

        if(botWrap && botWrap.parentNode) botWrap.remove();

        if(currentSendEl){
          const old = currentSendEl.textContent;
          currentSendEl.disabled = true;
          currentSendEl.classList.add('typing');
          currentSendEl.textContent = '◻';
          fetchAndAddBotMessage(root, currentSendEl, old, true);
        }
      }

      cancelBtn.addEventListener('click', cancelEdit);
      saveBtn.addEventListener('click', submitEdit);
      textarea.addEventListener('click', function(e){ e.stopPropagation(); });

      function autoResize(){
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
      }
      textarea.addEventListener('input', autoResize);

      textarea.addEventListener('keydown', function(e){
        if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); submitEdit(e); }
        if(e.key === 'Escape'){ cancelEdit(e); }
      });

      btnRow.appendChild(cancelBtn);
      btnRow.appendChild(saveBtn);
      userBubble.appendChild(textarea);
      userBubble.appendChild(btnRow);

      textarea.focus();
      textarea.setSelectionRange(textarea.value.length, textarea.value.length);
      autoResize();
    }

    function addUserMessage(text, root){
      const { scrollEl } = getEls(root);
      if(!scrollEl) return;
      const div = document.createElement("div");
      div.className = "msg user";
      div.title = "Click to edit";
      div.style.cursor = "text";
      div.textContent = text;
      div.addEventListener('click', function(e){
        if(div._nexoraEditing) return;
        // Pop animation on press
        div.classList.add('msg-pressed');
        div.addEventListener('animationend', function handler(){ div.classList.remove('msg-pressed'); div.removeEventListener('animationend', handler); });
        // Find the immediately following bot message in the scroll container
        const { scrollEl: sc } = getEls(root);
        const allMsgs = sc ? Array.from(sc.children) : [];
        const idx = allMsgs.indexOf(div);
        const nextBot = allMsgs.slice(idx + 1).find(el => el.classList.contains('msg') && el.classList.contains('bot')) || null;
        openBubbleEditor(div, nextBot, root);
      });
      scrollEl.appendChild(div);
      scrollEl.scrollTop = scrollEl.scrollHeight;
      
      lastUserPrompt = text;
      chatHistory.push({ role: 'user', content: text, text: text });
      saveChatHistory();
    }

    function addBotMessage(markup, root){
      const { scrollEl } = getEls(root);
      if(!scrollEl) return;

      const wrap = document.createElement("div");
      wrap.className = "msg bot";

      const name = document.createElement("div");
      name.className = "bot-name";
      name.textContent = AI_MODES[currentMode]?.name || "Nexora AI";

      const body = document.createElement("div");
      body.innerHTML = markup;

      // ── Action toolbar ──────────────────────────────────────
      const actions = document.createElement("div");
      actions.className = "msg-actions";
      actions.innerHTML = `
        <button class="msg-action-btn" data-action="copy" title="Copy response">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy
        </button>
        <button class="msg-action-btn" data-action="regenerate" title="Regenerate response">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.71"></path></svg>
          Regenerate
        </button>
        <button class="msg-action-btn" data-action="edit" title="Edit last message">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          Edit
        </button>
      `;

      actions.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if(!btn) return;
        const rootEl = root && root.querySelector ? root : document;
        const currentSendEl = rootEl.querySelector('#send');
        const currentPromptEl = rootEl.querySelector('#prompt');

        if(btn.dataset.action === 'copy'){
          const text = (body.innerText || body.textContent || '').trim();
          navigator.clipboard.writeText(text).catch(()=>{});
          const prev = btn.innerHTML;
          btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied';
          setTimeout(()=>{ btn.innerHTML = prev; }, 2000);
        }

        if(btn.dataset.action === 'regenerate'){
          if(!lastUserPrompt || (currentSendEl && currentSendEl.disabled)) return;
          if(chatHistory.length && chatHistory[chatHistory.length-1].role === 'bot'){
            chatHistory.pop();
            saveChatHistory();
          }
          wrap.remove();
          if(currentSendEl){
            const old = currentSendEl.textContent;
            currentSendEl.disabled = true;
            currentSendEl.classList.add('typing');
            currentSendEl.textContent = '◻';
            fetchAndAddBotMessage(root, currentSendEl, old, true);
          }
        }

        if(btn.dataset.action === 'edit'){
          if(!lastUserPrompt) return;
          const allUserMsgs = scrollEl.querySelectorAll('.msg.user');
          const userBubble = allUserMsgs.length ? allUserMsgs[allUserMsgs.length - 1] : null;
          openBubbleEditor(userBubble, wrap, root);
        }
      });

      wrap.appendChild(name);
      wrap.appendChild(body);
      wrap.appendChild(actions);
      scrollEl.appendChild(wrap);

      // Render LaTeX
      if(window.renderMathInElement){
        try {
          renderMathInElement(body, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '\\[', right: '\\]', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false}
            ],
            throwOnError: false
          });
        } catch(e){ console.error('KaTeX rendering error:', e); }
      }

      scrollEl.scrollTop = scrollEl.scrollHeight;

      wrap.querySelectorAll(".copy-btn").forEach(btn=>{
        if(btn.dataset.nexoraCopy) return;
        btn.dataset.nexoraCopy = "1";
        btn.onclick = () => {
          const codeEl = btn.closest(".code")?.querySelector("pre");
          const code = codeEl ? codeEl.innerText : "";
          if(code) navigator.clipboard.writeText(code).catch(()=>{});
          const old = btn.innerHTML;
          btn.innerHTML = '✅ Copied';
          setTimeout(()=>{ btn.innerHTML = old; }, 1500);
        };
      });

      requestAnimationFrame(()=>{ if(window.hljs) hljs.highlightAll(); });

      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = markup;
      const textContent = tempDiv.textContent || tempDiv.innerText || '';
      chatHistory.push({ role: 'bot', content: markup, text: textContent });
      saveChatHistory();
    }

    function saveChatHistory(){
      try {
        sessionStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatHistory));
      } catch(e) {
        console.error('Failed to save chat history:', e);
      }
    }

    function resetChat(root){
      try {
        chatHistory = [];
        sessionStorage.removeItem(CHAT_STORAGE_KEY);
        
        const { scrollEl, introEl } = getEls(root);
        
        if(scrollEl){
          scrollEl.innerHTML = '';
        }
        
        if(introEl){
          introEl.classList.remove('hidden');
          startIntroLoop(root);
        }
      } catch(e) {
        console.error('Failed to reset chat:', e);
      }
    }

    function loadChatHistory(root){
      try {
        const saved = sessionStorage.getItem(CHAT_STORAGE_KEY);
        if(!saved) return;
        
        chatHistory = JSON.parse(saved);
        const { scrollEl, introEl } = getEls(root);
        if(!scrollEl) return;
        
        if(chatHistory.length > 0 && introEl){
          stopIntroLoop(root);
          introEl.classList.add('hidden');
        }
        
        chatHistory.forEach(msg => {
          if(msg.role === 'user'){
            const div = document.createElement("div");
            div.className = "msg user";
            div.title = "Click to edit";
            div.style.cursor = "text";
            div.textContent = msg.content;
            div.addEventListener('click', function(e){
              if(div._nexoraEditing) return;
              div.classList.add('msg-pressed');
              div.addEventListener('animationend', function handler(){ div.classList.remove('msg-pressed'); div.removeEventListener('animationend', handler); });
              const { scrollEl: sc } = getEls(root);
              const allMsgs = sc ? Array.from(sc.children) : [];
              const idx = allMsgs.indexOf(div);
              const nextBot = allMsgs.slice(idx + 1).find(el => el.classList.contains('msg') && el.classList.contains('bot')) || null;
              openBubbleEditor(div, nextBot, root);
            });
            scrollEl.appendChild(div);
          } else if(msg.role === 'bot'){
            const wrap = document.createElement("div");
            wrap.className = "msg bot";

            const name = document.createElement("div");
            name.className = "bot-name";
            name.textContent = AI_MODES[currentMode]?.name || "Nexora AI";

            const body = document.createElement("div");
            body.innerHTML = msg.content;

            wrap.appendChild(name);
            wrap.appendChild(body);
            scrollEl.appendChild(wrap);
            
            // Render LaTeX math expressions
            if(window.renderMathInElement) {
              try {
                renderMathInElement(body, {
                  delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '\\[', right: '\\]', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false}
                  ],
                  throwOnError: false
                });
              } catch(e) {
                console.error('KaTeX rendering error:', e);
              }
            }
            
            wrap.querySelectorAll(".copy-btn").forEach(btn=>{
              if(btn.dataset.nexoraCopy) return;
              btn.dataset.nexoraCopy = "1";
              btn.onclick = () => {
                const codeEl = btn.closest(".code")?.querySelector("pre");
                const code = codeEl ? codeEl.innerText : "";
                if(code) navigator.clipboard.writeText(code).catch(()=>{});
                const old = btn.innerHTML;
                btn.textContent = "✅";
                setTimeout(()=>{ btn.innerHTML = old; }, 1500);
              };
            });
          }
        });
        
        scrollEl.scrollTop = scrollEl.scrollHeight;
        requestAnimationFrame(()=>{ if(window.hljs) hljs.highlightAll(); });
      } catch(e) {
        console.error('Failed to load chat history:', e);
      }
    }

    const introState = new WeakMap();

    function startIntroLoop(root){
      const els = getEls(root);
      const introEl = els.introEl;
      if(!introEl) return;
      if(introState.has(introEl)) return;

      const h1 = introEl.querySelector('h1');
      if(!h1) return;

      const text = h1.textContent.trim() || "What can I help you with?";
      h1.textContent = '';
      let pos = 0;
      let deleting = false;
      let speed = 80;
      let timer = null;

      function step(){
        if(!introEl || !h1) return stop();
        if(!deleting){
          pos++;
          h1.textContent = text.slice(0,pos);
          if(pos >= text.length){
            deleting = true;
            clearTimeout(timer);
            timer = setTimeout(step, 900);
            return;
          }
        } else {
          pos--;
          h1.textContent = text.slice(0,pos);
          if(pos <= 0){
            deleting = false;
            clearTimeout(timer);
            timer = setTimeout(step, 500);
            return;
          }
        }
        timer = setTimeout(step, deleting ? speed/2 : speed);
      }

      function stop(){
        if(timer) clearTimeout(timer);
        introState.delete(introEl);
        if(h1) h1.textContent = text;
        introEl.classList.remove('nexora-intro-running');
      }

      introState.set(introEl, { stop });
      introEl.classList.add('nexora-intro-running');
      timer = setTimeout(step, 500);
    }

    function stopIntroLoop(root){
      const els = getEls(root);
      const introEl = els.introEl;
      if(!introEl) return;
      const ctl = introState.get(introEl);
      if(ctl && typeof ctl.stop === 'function') ctl.stop();
    }

    function showTypingIndicator(root){
      const { scrollEl } = getEls(root);
      if(!scrollEl) return;
      if(scrollEl.querySelector('#nexora-typing')) return;
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.id = 'nexora-typing';

      const name = document.createElement('div');
      name.className = 'bot-name';
      name.textContent = AI_MODES[currentMode]?.name || 'Nexora AI';

      const body = document.createElement('div');
      body.innerHTML = `<div class="typing-indicator"><div class="loader" aria-hidden="true"></div><div>Typing...</div></div>`;

      wrap.appendChild(name);
      wrap.appendChild(body);
      scrollEl.appendChild(wrap);
      scrollEl.scrollTop = scrollEl.scrollHeight;
    }

    function hideTypingIndicator(root){
      const { scrollEl } = getEls(root);
      if(!scrollEl) return;
      const el = scrollEl.querySelector('#nexora-typing');
      if(el && el.parentNode) el.parentNode.removeChild(el);
    }

    function showSystemNote(text, root){
      const { scrollEl } = getEls(root);
      if(!scrollEl) return;
      const div = document.createElement('div');
      div.className = 'msg system-note';
      div.textContent = text;
      scrollEl.appendChild(div);
      scrollEl.scrollTop = scrollEl.scrollHeight;
    }

    function updateQuotaDisplay(root){
      const el = (root && root.querySelector) ? root.querySelector('#quota-info') : document.querySelector('#quota-info');
      if(!el) return;
      const lim = remainingLimits();
      const d = lim.dayRemaining;
      el.textContent = `${d} message${d !== 1 ? 's' : ''} left today`;
      el.className = 'quota-info' + (d <= 5 ? ' quota-warn' : '') + (d === 0 ? ' quota-empty' : '');
    }

    async function fetchAndAddBotMessage(root, sendEl, oldLabel, skipRecord = false){
      showTypingIndicator(root);
      const { scrollEl } = getEls(root);
      try {
        if(!skipRecord) recordSend();
        updateQuotaDisplay(root);
        const systemPrompt = AI_MODES[currentMode]?.systemPrompt || AI_MODES.general.systemPrompt;
        const maxHistory = AI_MODES[currentMode]?.maxHistory || 10;
        const limitedHistory = maxHistory === Infinity ? chatHistory : chatHistory.slice(-maxHistory);
        const messages = buildOptimizedMessages(systemPrompt, limitedHistory, currentMode);
        let res;
        try {
          res = await fetch(LAMBDA_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages }),
            mode: 'cors'
          });
        } catch(fetchError) {
          throw new Error(`Network request failed: ${fetchError.message}. This may be due to CORS policy, network connectivity, or the Lambda endpoint being unavailable.`);
        }
        if(!res.ok){
          let errorDetail = `HTTP ${res.status}`;
          try {
            const errorText = await res.text();
            try { const d = JSON.parse(errorText); errorDetail = d.error || d.message || errorText || errorDetail; } catch { errorDetail = errorText || errorDetail; }
          } catch {}
          throw new Error(errorDetail);
        }
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || data.error || "API Error";
        const markup = renderReplyWithCode(String(reply || ""));
        hideTypingIndicator(root);
        addBotMessage(markup, root);
      } catch(err) {
        hideTypingIndicator(root);
        addBotMessage(`<div class="bot-chunk"><strong>Error:</strong> ${escapeHtml(err?.message || String(err))}</div>`, root);
      } finally {
        if(sendEl){ sendEl.classList.remove("typing"); sendEl.textContent = oldLabel; sendEl.disabled = false; }
        if(scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
      }
    }

    async function sendMessage(root){
      const els = getEls(root);
      const { introEl, promptEl, sendEl, scrollEl } = els;
      if(!promptEl || !sendEl) return;

      if(sendEl.disabled) return;

      const prompt = promptEl.value.trim();
      if(!prompt) return;

      // Rate limit checks
      const gate = canSendNow();
      if(!gate.ok){
        const left = remainingLimits();
        if(!gate.reason.cooldownOk){
          // Show countdown in send button; re-enable when ready
          let cdLeft = Math.ceil(left.cooldownMsLeft / 1000);
          sendEl.disabled = true;
          sendEl.textContent = `${cdLeft}s`;
          const cdTimer = setInterval(() => {
            cdLeft--;
            if(cdLeft <= 0){
              clearInterval(cdTimer);
              sendEl.textContent = '↑';
              if(!sendEl.classList.contains('typing')) sendEl.disabled = false;
            } else {
              sendEl.textContent = `${cdLeft}s`;
            }
          }, 1000);
        } else {
          const reasons = [];
          if(!gate.reason.hourOk) reasons.push('hourly limit — try again in an hour');
          if(!gate.reason.dayOk)  reasons.push('daily limit — try again tomorrow');
          showSystemNote(`⚠ You've reached the ${reasons.join(' & ')}.`, root);
          updateQuotaDisplay(root);
        }
        return;
      }

      stopIntroLoop(root);

      if(introEl && !introEl.classList.contains("hidden")){
        introEl.classList.add("hidden");
      }

      addUserMessage(prompt, root);
      promptEl.value = "";

      sendEl.disabled = true;
      sendEl.classList.add("typing");
      sendEl.classList.add("sent-bounce");
      sendEl.addEventListener('animationend', function handler(){ sendEl.classList.remove('sent-bounce'); sendEl.removeEventListener('animationend', handler); });
      const oldLabel = sendEl.textContent;
      sendEl.textContent = "◻";

      await fetchAndAddBotMessage(root, sendEl, oldLabel);
    }

    function attachTo(root){
      const els = getEls(root);
      const { promptEl, sendEl } = els;
      if(!promptEl || !sendEl) return false;
      if(sendEl.dataset.nexoraAttached) return true;

      const boundSend = ()=> sendMessage(root);
      
      const resetBtn = root.querySelector ? root.querySelector('#reset-chat') : document.querySelector('#reset-chat');
      if(resetBtn && !resetBtn.dataset.nexoraReset){
        resetBtn.dataset.nexoraReset = '1';
        resetBtn.addEventListener('click', () => resetChat(root));
      }

      const modeSelector = root.querySelector ? root.querySelector('#ai-mode') : document.querySelector('#ai-mode');
      if(modeSelector && !modeSelector.dataset.nexoraMode){
        modeSelector.dataset.nexoraMode = '1';
        
        // Load saved mode
        try {
          const savedMode = localStorage.getItem(MODE_STORAGE_KEY);
          if(savedMode && AI_MODES[savedMode]){
            currentMode = savedMode;
            modeSelector.value = savedMode;
          }
        } catch(e) {}
        
        modeSelector.addEventListener('change', (e) => {
          currentMode = e.target.value;
          try {
            localStorage.setItem(MODE_STORAGE_KEY, currentMode);
          } catch(e) {}
          resetChat(root);
        });
      }

      sendEl.addEventListener("click", boundSend);

      promptEl.addEventListener("compositionstart", ()=> { promptEl.dataset.nexoraComposing = "1"; });
      promptEl.addEventListener("compositionend", ()=> { delete promptEl.dataset.nexoraComposing; });

      promptEl.addEventListener("keydown", function(e){
        if(promptEl.dataset.nexoraComposing) return;
        const isEnter = e.key === "Enter" || e.code === "Enter" || e.keyCode === 13;
        if(!isEnter) return;
        if(e.shiftKey) return;
        e.preventDefault();
        boundSend();
      });

      promptEl.addEventListener("keypress", function(e){
        if(promptEl.dataset.nexoraComposing) return;
        const isEnter = e.key === "Enter" || e.keyCode === 13;
        if(!isEnter) return;
        e.preventDefault();
        boundSend();
      });

      sendEl.dataset.nexoraAttached = "1";

      loadChatHistory(root);
      updateQuotaDisplay(root);
      if(chatHistory.length === 0){
        startIntroLoop(root);
      }

      return true;
    }

    window.NexoraChat = {
      init(rootEl){
        try{
          const root = (rootEl instanceof Element) ? rootEl : document.querySelector('.nexora') || document;
          attachTo(root);
        }catch(e){
        }
      }
    };

    window.NexoraChat.init(document.querySelector('.nexora') || document);
    if(document.readyState !== "complete"){
      document.addEventListener("DOMContentLoaded", ()=>window.NexoraChat.init(document.querySelector('.nexora') || document));
    }

    const mo = new MutationObserver(mutations=>{
      for(const m of mutations){
        for(const n of m.addedNodes){
          if(!(n instanceof HTMLElement)) continue;
          if(n.classList && n.classList.contains('nexora')){
            window.NexoraChat.init(n);
            continue;
          }
          if(n.querySelector && (n.querySelector("#send") || n.querySelector("#prompt") || n.querySelector(".app"))){
            const nearest = n.closest('.nexora') || document;
            window.NexoraChat.init(nearest);
          }
        }
      }
    });

    const startObserve = ()=>{
      if(document.body) mo.observe(document.body, { childList:true, subtree:true });
      else setTimeout(startObserve, 50);
    };
    startObserve();

  })();
  </script>
</body>
</html>
