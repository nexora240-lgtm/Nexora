<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links - Nexora</title>
  <meta name="description" content="Quick access to game links and resources from Nexora" />
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets/logos/nexora-amber.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/_tokens.css" />
  <link rel="stylesheet" href="/css/links.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="/js/mouse-tracking.js"></script>

  <script>
    (function () {
      try {
        var THEME_KEY = 'settings.theme';
        var SCHEME_KEY = 'settings.colorScheme';
        var MAP = {
          'midnight-amber': 'theme-midnight-amber',
          'midnight-blueberry': 'theme-midnight-blueberry',
          'midnight-grape': 'theme-midnight-grape'
        };

        var savedTheme = null;
        var savedScheme = null;
        try {
          savedTheme = localStorage.getItem(THEME_KEY);
          savedScheme = localStorage.getItem(SCHEME_KEY);
        } catch (e) {}

        var doc = document.documentElement;

        if (savedScheme === 'light') {
          doc.classList.add('light-scheme');
          var cls = (savedTheme && MAP[savedTheme]) ? MAP[savedTheme] : 'theme-midnight-amber';
          doc.classList.add(cls);
        } else {
          var cls = (savedTheme && MAP[savedTheme]) ? MAP[savedTheme] : 'theme-midnight-amber';
          doc.classList.add(cls);
        }
      } catch (err) {}
    })();
  </script>
</head>
<body>
  <div class="page-frame"></div>
  <div class="links-page">
    <header class="links-header">
      <h1 id="page-title">Nexora Links</h1>
      <p id="page-subtitle">Quick access to all your favorite games and resources</p>
    </header>

    <div class="links-container">
      <a href="/" class="back-link">
        <i class="fas fa-arrow-left"></i>
        Back to Nexora
      </a>

      <div class="links-search">
        <input 
          type="text" 
          class="search-input" 
          placeholder="Search links..." 
          id="search-input"
          autocomplete="off"
        />
      </div>

      <div class="links-filters" id="links-filters">
        <button class="filter-btn active" data-sort="default"><i class="fas fa-list"></i> All</button>
        <button class="filter-btn" data-sort="newest"><i class="fas fa-bolt"></i> Newest</button>
        <button class="filter-btn" data-sort="oldest"><i class="fas fa-history"></i> Oldest</button>
        <button class="filter-btn" data-sort="az"><i class="fas fa-sort-alpha-down"></i> A → Z</button>
        <button class="filter-btn" data-sort="za"><i class="fas fa-sort-alpha-up"></i> Z → A</button>
      </div>

      <div class="submit-link-bar" id="submit-link-bar">
        <input type="text" id="submit-url" class="search-input" placeholder="Submit a Nexora link (https://...)" autocomplete="off" />
        <button id="submit-link-btn" class="world-open-btn"><i class="fas fa-plus"></i> Submit</button>
      </div>
      <p class="submit-status" id="submit-status"></p>

      <div id="links-content">
        <div class="links-loading">
          <div class="spinner"></div>
          <p>Loading links...</p>
        </div>
      </div>

      <div class="links-pagination" id="links-pagination"></div>
    </div>
  </div>

  <div class="copy-toast" id="copy-toast">
    <i class="fas fa-check-circle"></i>
    <span>Link copied to clipboard!</span>
  </div>

  <script>
    (function() {
      let allLinks = [];
      let currentSort = 'default';
      let currentPage = 1;
      const PER_PAGE = 10;
      const LINKS_API = 'https://2zpvhn3woh.execute-api.us-east-2.amazonaws.com/links';

      // Flatten all non-resources links from static JSON
      function flattenLinks(sections) {
        const all = [];
        sections.forEach(section => {
          if (section.id === 'resources') return;
          section.links.forEach(link => {
            if (link.name === 'Coming Soon!') return;
            all.push({ name: link.name, url: link.url });
          });
        });
        return all;
      }

      // Fetch links — try API first, fall back to static JSON
      async function loadLinks() {
        try {
          // Try the live API
          const apiRes = await fetch(LINKS_API, { signal: AbortSignal.timeout(5000) });
          if (apiRes.ok) {
            const data = await apiRes.json();
            allLinks = (data.links || []).map(l => ({ name: l.name || l.domain, url: l.url }));
          } else {
            throw new Error('API returned ' + apiRes.status);
          }
        } catch (apiErr) {
          console.warn('Links API unavailable, falling back to static JSON:', apiErr.message);
          try {
            const res = await fetch('/links.json');
            const data = await res.json();
            allLinks = flattenLinks(data.sections);
          } catch (jsonErr) {
            console.error('Failed to load links:', jsonErr);
            document.getElementById('links-content').innerHTML = `
              <div class="no-results">
                <i class="fas fa-exclamation-circle"></i>
                <p>Failed to load links. Please try again later.</p>
              </div>
            `;
            return;
          }
        }

        renderLinks();
      }

      // Sort a flat array of links
      function sortLinks(links, sort) {
        const copy = [...links];
        if (sort === 'newest') return copy.reverse();
        if (sort === 'oldest') return copy;
        if (sort === 'az') return copy.sort((a, b) => getMainDomain(a.url).localeCompare(getMainDomain(b.url)));
        if (sort === 'za') return copy.sort((a, b) => getMainDomain(b.url).localeCompare(getMainDomain(a.url)));
        return copy;
      }

      // Render current page
      function renderLinks() {
        if (!allLinks.length) return;
        const filter = document.getElementById('search-input').value.toLowerCase().trim();
        const container = document.getElementById('links-content');
        const paginationEl = document.getElementById('links-pagination');

        let all = [...allLinks];

        // Filter
        if (filter) {
          all = all.filter(link =>
            link.name.toLowerCase().includes(filter) ||
            link.url.toLowerCase().includes(filter)
          );
        }

        // Sort
        all = sortLinks(all, currentSort);

        const totalPages = Math.max(1, Math.ceil(all.length / PER_PAGE));
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * PER_PAGE;
        const pageLinks = all.slice(start, start + PER_PAGE);

        // Render items
        if (all.length === 0) {
          container.innerHTML = `
            <div class="no-results">
              <i class="fas fa-search"></i>
              <p>No links found${filter ? ` matching "${escapeHtml(filter)}"` : ''}.</p>
            </div>
          `;
          paginationEl.innerHTML = '';
          return;
        }

        let html = '<div class="world-list">';
        pageLinks.forEach(link => {
          const domain = getMainDomain(link.url);
          html += `
            <div class="world-item">
              <div class="world-meta">
                <span class="world-domain">${escapeHtml(domain)}</span>
                <span class="world-label">${escapeHtml(link.name)}</span>
              </div>
              <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" class="world-open-btn">
                Open <i class="fas fa-arrow-right"></i>
              </a>
            </div>
          `;
        });
        html += '</div>';
        container.innerHTML = html;

        // Render pagination
        renderPagination(totalPages, paginationEl);
      }

      function renderPagination(totalPages, el) {
        if (totalPages <= 1) { el.innerHTML = ''; return; }

        const range = [];
        for (let i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
            range.push(i);
          } else if (range[range.length - 1] !== '...') {
            range.push('...');
          }
        }

        let html = `<button class="page-btn" data-page="prev" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        range.forEach(item => {
          if (item === '...') {
            html += `<span class="page-ellipsis">...</span>`;
          } else {
            html += `<button class="page-btn ${item === currentPage ? 'active' : ''}" data-page="${item}">${item}</button>`;
          }
        });
        html += `<button class="page-btn" data-page="next" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;

        el.innerHTML = html;
      }

      // Extract main domain (strip subdomains)
      function getMainDomain(url) {
        try {
          const hostname = new URL(url).hostname;
          const parts = hostname.split('.');
          if (parts.length <= 2) return hostname;
          return parts.slice(-2).join('.');
        } catch (e) {
          return url;
        }
      }

      // Escape HTML to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Search
      document.getElementById('search-input').addEventListener('input', function() {
        currentPage = 1;
        renderLinks();
      });

      // Filter buttons
      document.getElementById('links-filters').addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        currentSort = btn.dataset.sort;
        currentPage = 1;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderLinks();
      });

      // Pagination clicks
      document.getElementById('links-pagination').addEventListener('click', function(e) {
        const btn = e.target.closest('.page-btn');
        if (!btn || btn.disabled) return;
        const p = btn.dataset.page;
        if (p === 'prev') currentPage--;
        else if (p === 'next') currentPage++;
        else currentPage = parseInt(p);
        renderLinks();
        document.querySelector('.links-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // Submit link
      document.getElementById('submit-link-btn').addEventListener('click', async function() {
        const input = document.getElementById('submit-url');
        const status = document.getElementById('submit-status');
        const url = input.value.trim();
        if (!url) { status.textContent = 'Enter a URL first.'; status.className = 'submit-status error'; return; }

        status.textContent = 'Verifying...'; status.className = 'submit-status';
        this.disabled = true;

        try {
          const res = await fetch(LINKS_API.replace(/\/links$/, '/links/submit'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (res.ok) {
            status.textContent = data.message || 'Link added!';
            status.className = 'submit-status success';
            input.value = '';
            loadLinks(); // refresh
          } else {
            status.textContent = data.error || 'Submission failed.';
            if (data.reason) status.textContent += ' (' + data.reason + ')';
            status.className = 'submit-status error';
          }
        } catch (err) {
          status.textContent = 'Network error. Try again.';
          status.className = 'submit-status error';
        }
        this.disabled = false;
      });

      loadLinks();
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Check if particles are enabled (default true)
      let particlesEnabled = true;
      try {
        const savedParticles = localStorage.getItem('settings.particles');
        if (savedParticles !== null) {
          particlesEnabled = JSON.parse(savedParticles);
        }
      } catch (e) {
        particlesEnabled = true;
      }

      function initParticles() {
        if (!document.getElementById('particles-js')) {
          var div = document.createElement('div');
          div.id = 'particles-js';
          div.style.position = 'fixed';
          div.style.top = '0';
          div.style.left = '0';
          div.style.width = '100%';
          div.style.height = '100%';
          div.style.zIndex = '-1';
          div.style.pointerEvents = 'none';
          document.body.appendChild(div);
        }

        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js';
        script.onload = function() {
          var cfg = {
            "particles": {
              "number": {
                "value": 100,
                "density": {
                  "enable": true,
                  "value_area": 800
                }
              },
              "color": {
                "value": "#ffffff"
              },
              "shape": {
                "type": "circle"
              },
              "opacity": {
                "value": 0.5,
                "random": false,
                "anim": {
                  "enable": false,
                  "speed": 0.5,
                  "opacity_min": 0.1,
                  "sync": false
                }
              },
              "size": {
                "value": 7,
                "random": true,
                "anim": {
                  "enable": false,
                  "speed": 71.71429026757396,
                  "size_min": 0.1,
                  "sync": false
                }
              },
              "line_linked": {
                "enable": false,
                "distance": 150,
                "color": "#ffffff",
                "opacity": 0.1,
                "width": 1
              },
              "move": {
                "enable": true,
                "speed": 1,
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false,
                "attract": {
                  "enable": false,
                  "rotateX": 600,
                  "rotateY": 1200
                }
              }
            },
            "interactivity": {
              "detect_on": "canvas",
              "events": {
                "onhover": {
                  "enable": true,
                  "mode": "bubble"
                },
                "onclick": {
                  "enable": true,
                  "mode": "repulse"
                },
                "resize": true
              },
              "modes": {
                "grab": {
                  "distance": 400,
                  "line_linked": {
                    "opacity": 1
                  }
                },
                "bubble": {
                  "distance": 286.85716107029583,
                  "size": 7.968254474174885,
                  "duration": 2.1514287080272188,
                  "opacity": 8,
                  "speed": 3
                },
                "repulse": {
                  "distance": 113.14228450435593,
                  "duration": 0.4
                },
                "push": {
                  "particles_nb": 4
                },
                "remove": {
                  "particles_nb": 2
                }
              }
            },
            "retina_detect": true
          };

          particlesJS('particles-js', cfg);
        };
        document.head.appendChild(script);
      }

      function removeParticles() {
        var particlesDiv = document.getElementById('particles-js');
        if (particlesDiv) {
          particlesDiv.remove();
        }
        if (window.pJSDom && window.pJSDom.length > 0) {
          window.pJSDom = [];
        }
      }

      if (particlesEnabled) {
        initParticles();
      }

      document.addEventListener('settings:particlesToggled', function(e) {
        if (e.detail.enabled) {
          initParticles();
        } else {
          removeParticles();
        }
      });
    });
  </script>

  <script>
    (function() {
      function attachMouseTracking() {
        const linkItems = document.querySelectorAll('.world-item');
        if (!window.NexoraMouseTracking) return;

        linkItems.forEach(item => {
          if (item.dataset.mouseTrackingBound) return;
          item.dataset.mouseTrackingBound = 'true';
          window.NexoraMouseTracking.bindElement(item);
        });
      }
      
      // Use MutationObserver to handle dynamically added link items
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.addedNodes.length) {
            attachMouseTracking();
          }
        });
      });
      
      document.addEventListener('DOMContentLoaded', () => {
        const linksContent = document.getElementById('links-content');
        if (linksContent) {
          observer.observe(linksContent, {
            childList: true,
            subtree: true
          });
        }
      });
    })();
  </script>
</body>
</html>
