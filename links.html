<!DOCTYPE html>
<html lang="en" class="theme-midnight-amber">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>Link Finder — Standalone</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
/* ═══════════════════════════════════════════════════════
   Theme Tokens (from _tokens.css)
   ═══════════════════════════════════════════════════════ */
:root {
  --page-bg: #ffffff;
  --surface: #f7f7f8;
  --surface-2: #efefef;
  --primary: #d4550a;
  --primary-deep: #992f05;
  --primary-shadow: rgba(212,85,10,0.5);
  --primary-accent: var(--primary);
  --on-primary: #fff0e8;
  --text: #111111;
  --muted: #666666;
  --radius: 10px;
  --control-gap: 12px;
  --focus-ring: 3px;
  --focus-color: rgba(212,85,10,0.18);
  --contrast-high: rgba(0,0,0,0.85);
  --contrast-low: rgba(0,0,0,0.5);
  --accent-gradient: linear-gradient(90deg, var(--primary-deep), var(--primary));
}

.theme-midnight-amber {
  --page-bg: #0a0605;
  --surface: #1a100d;
  --surface-2: #1f1410;
  --primary: #d4550a;
  --primary-deep: #992f05;
  --primary-shadow: rgba(212,85,10,0.5);
  --primary-accent: var(--primary);
  --on-primary: #fff0e8;
  --text: #f8e7e0;
  --muted: #c9a08a;
  --contrast-high: rgba(255,255,255,0.94);
  --contrast-low: rgba(255,255,255,0.66);
  --focus-color: rgba(212,85,10,0.18);
  --accent-gradient: linear-gradient(90deg, rgba(255,77,0,1), rgba(255,106,0,1));
}

.theme-midnight-blueberry {
  --page-bg: #071026;
  --surface: #0d1b2a;
  --surface-2: #112534;
  --primary: #6ea8fe;
  --primary-deep: #3f78d1;
  --primary-shadow: rgba(110,168,254,0.35);
  --primary-accent: var(--primary);
  --on-primary: #dbe9ff;
  --text: #dbe9ff;
  --muted: #9fb7d6;
  --contrast-high: rgba(255,255,255,0.95);
  --contrast-low: rgba(255,255,255,0.7);
  --focus-color: rgba(110,168,254,0.16);
  --accent-gradient: linear-gradient(90deg, #3f78d1, #6ea8fe);
}

.theme-midnight-grape {
  --page-bg: #0a0812;
  --surface: #171024;
  --surface-2: #211428;
  --primary: #b388ff;
  --primary-deep: #7a4ed1;
  --primary-shadow: rgba(179,136,255,0.35);
  --primary-accent: var(--primary);
  --on-primary: #efe7ff;
  --text: #efe7ff;
  --muted: #cdb9e8;
  --contrast-high: rgba(255,255,255,0.95);
  --contrast-low: rgba(255,255,255,0.72);
  --focus-color: rgba(179,136,255,0.16);
  --accent-gradient: linear-gradient(90deg, #7a4ed1, #b388ff);
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--page-bg);
  color: var(--text);
  font-family: 'Poppins', Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}

:focus {
  outline: none;
  box-shadow: 0 0 0 var(--focus-ring) var(--focus-color);
  border-radius: calc(var(--radius) - 2px);
}

/* ═══════════════════════════════════════════════════════
   Link Finder Styles (from linkfinder.css)
   ═══════════════════════════════════════════════════════ */
.lf {
  --lf-bg: transparent;
  --lf-panel: var(--surface, #1a100d);
  --lf-panel-2: var(--surface-2, #1f1410);
  --lf-accent: var(--primary, #d4550a);
  --lf-accent-deep: var(--primary-deep, #992f05);
  --lf-accent-shadow: var(--primary-shadow, rgba(212,85,10,0.5));
  --lf-text: var(--text, #f8e7e0);
  --lf-muted: var(--muted, #c9a08a);
  --lf-on-accent: var(--on-primary, #fff0e8);
  --lf-radius: var(--radius, 10px);
  --lf-glass: color-mix(in srgb, var(--lf-panel) 45%, transparent);
  --lf-glass-border: color-mix(in srgb, var(--lf-muted) 18%, transparent);
  --lf-glass-blur: 18px;
  --lf-neu-light: color-mix(in srgb, var(--lf-text) 5%, transparent);
  --lf-neu-dark: color-mix(in srgb, var(--lf-panel) 55%, transparent);
  box-sizing: border-box;
  height: 100%;
  color: var(--lf-text);
  font: 500 16px/1.5 'Poppins', Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  background: transparent;
}
.lf *, .lf *::before, .lf *::after { box-sizing: inherit; }

.lf-app { display: flex; flex-direction: column; height: 100%; }
.lf-chat { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

.lf-intro {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; z-index: 5; overflow-y: auto;
}
.lf-intro.hidden { display: none; }

.lf-intro-content {
  max-width: 520px; text-align: center;
  animation: lf-fadeIn 0.5s ease;
  background: var(--lf-glass);
  backdrop-filter: blur(var(--lf-glass-blur));
  -webkit-backdrop-filter: blur(var(--lf-glass-blur));
  border: 1px solid var(--lf-glass-border);
  border-radius: 24px; padding: 36px 28px;
  box-shadow: 6px 6px 16px var(--lf-neu-dark), -4px -4px 12px var(--lf-neu-light);
}

.lf-intro-content h1 {
  margin: 0 0 8px; font-size: 32px; font-weight: 800; letter-spacing: 0.2px;
  background: linear-gradient(90deg, var(--lf-accent), var(--lf-accent-deep));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.lf-intro-content > p { margin: 0 0 28px; font-size: 14px; color: var(--lf-muted); }

.lf-quick-start { margin-bottom: 24px; }
.lf-quick-label { font-size: 13px; font-weight: 600; color: var(--lf-muted); margin: 0 0 10px; }
.lf-optional { font-weight: 400; opacity: 0.6; }

.lf-strictness-picker { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }

.lf-strict-btn {
  width: 40px; height: 40px;
  border: 1px solid var(--lf-glass-border); border-radius: 12px;
  background: var(--lf-glass);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  color: var(--lf-muted); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.25s ease;
  box-shadow: 3px 3px 8px var(--lf-neu-dark), -2px -2px 6px var(--lf-neu-light);
}
.lf-strict-btn:hover {
  border-color: color-mix(in srgb, var(--lf-muted) 30%, transparent);
  color: var(--lf-accent);
  box-shadow: 4px 4px 12px var(--lf-neu-dark), -3px -3px 8px var(--lf-neu-light);
}
.lf-strict-btn.active {
  background: linear-gradient(135deg, var(--lf-accent), var(--lf-accent-deep));
  color: var(--lf-on-accent); border-color: transparent;
  box-shadow: inset 2px 2px 6px rgba(0,0,0,0.3), 0 4px 18px var(--lf-accent-shadow);
  transform: scale(1.08);
}

.lf-scale-labels {
  display: flex; justify-content: space-between;
  margin-top: 6px; font-size: 11px; color: var(--lf-muted); opacity: 0.6; padding: 0 4px;
}

.lf-blocker-chips { margin-bottom: 24px; }
.lf-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

.lf-chip {
  padding: 6px 14px;
  border: 1px solid var(--lf-glass-border); border-radius: 20px;
  background: var(--lf-glass);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  color: var(--lf-muted); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.25s ease;
  box-shadow: 2px 2px 6px var(--lf-neu-dark), -1px -1px 4px var(--lf-neu-light);
}
.lf-chip:hover {
  border-color: color-mix(in srgb, var(--lf-muted) 30%, transparent);
  color: var(--lf-accent);
  box-shadow: 3px 3px 8px var(--lf-neu-dark), -2px -2px 6px var(--lf-neu-light);
}
.lf-chip.active {
  background: color-mix(in srgb, var(--lf-accent) 15%, transparent);
  border-color: var(--lf-accent); color: var(--lf-accent);
  box-shadow: inset 2px 2px 4px color-mix(in srgb, var(--lf-panel) 50%, transparent),
    0 0 12px color-mix(in srgb, var(--lf-accent) 15%, transparent);
}

.lf-go-btn {
  padding: 12px 32px;
  border: 1px solid color-mix(in srgb, var(--lf-text) 10%, transparent);
  border-radius: 14px;
  background: linear-gradient(135deg, var(--lf-accent), var(--lf-accent-deep));
  color: var(--lf-on-accent); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.25s ease;
  box-shadow: 5px 5px 14px var(--lf-neu-dark), -3px -3px 10px var(--lf-neu-light), 0 4px 20px var(--lf-accent-shadow);
}
.lf-go-btn:disabled {
  opacity: 0.35; cursor: not-allowed;
  box-shadow: 2px 2px 6px var(--lf-neu-dark), -1px -1px 4px var(--lf-neu-light);
}
.lf-go-btn:not(:disabled):hover {
  transform: translateY(-2px);
  box-shadow: 6px 6px 18px var(--lf-neu-dark), -4px -4px 12px var(--lf-neu-light), 0 6px 28px var(--lf-accent-shadow);
}

.lf-scroll {
  flex: 1; overflow-y: auto; padding: 20px; gap: 12px;
  display: flex; flex-direction: column;
}

.lf-msg { max-width: 80%; animation: lf-fadeIn 0.3s ease; }
.lf-msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--lf-accent), var(--lf-accent-deep));
  color: var(--lf-on-accent); padding: 10px 14px;
  border-radius: 18px 18px 6px 18px;
  border: 1px solid color-mix(in srgb, var(--lf-text) 10%, transparent);
  box-shadow: 4px 4px 12px var(--lf-neu-dark), -2px -2px 8px var(--lf-neu-light), 0 4px 16px var(--lf-accent-shadow);
  font-size: 14px; line-height: 1.5;
  animation: lf-slideRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.lf-msg.bot {
  align-self: flex-start;
  background: var(--lf-glass);
  backdrop-filter: blur(var(--lf-glass-blur)); -webkit-backdrop-filter: blur(var(--lf-glass-blur));
  color: var(--lf-text); padding: 14px 18px;
  border-radius: 18px 18px 18px 6px;
  border: 1px solid var(--lf-glass-border);
  font-size: 14px; line-height: 1.6;
  box-shadow: 4px 4px 12px var(--lf-neu-dark), -2px -2px 8px var(--lf-neu-light);
  animation: lf-slideLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.lf-msg.bot strong { color: var(--lf-accent); }

.lf-typing {
  align-self: flex-start; display: flex; gap: 4px; padding: 14px 20px;
  background: var(--lf-glass);
  backdrop-filter: blur(var(--lf-glass-blur)); -webkit-backdrop-filter: blur(var(--lf-glass-blur));
  border-radius: 18px 18px 18px 6px;
  border: 1px solid var(--lf-glass-border);
  box-shadow: 3px 3px 10px var(--lf-neu-dark), -2px -2px 6px var(--lf-neu-light);
}
.lf-typing span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--lf-muted); animation: lf-bounce 1.4s infinite;
}
.lf-typing span:nth-child(2) { animation-delay: 0.2s; }
.lf-typing span:nth-child(3) { animation-delay: 0.4s; }

.lf-link-cards { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.lf-link-card {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--lf-glass);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--lf-glass-border); border-radius: 14px;
  transition: all 0.25s ease; text-decoration: none; color: inherit;
  box-shadow: 3px 3px 10px var(--lf-neu-dark), -2px -2px 6px var(--lf-neu-light);
}
.lf-link-card:hover {
  border-color: color-mix(in srgb, var(--lf-muted) 30%, transparent);
  transform: translateX(4px);
  box-shadow: 5px 5px 14px var(--lf-neu-dark), -3px -3px 8px var(--lf-neu-light), 0 0 18px color-mix(in srgb, var(--lf-accent) 10%, transparent);
}
.lf-link-card .lf-card-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: color-mix(in srgb, var(--lf-accent) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--lf-text) 5%, transparent);
  display: flex; align-items: center; justify-content: center;
  color: var(--lf-accent); font-size: 14px; flex-shrink: 0;
  box-shadow: inset 2px 2px 4px color-mix(in srgb, var(--lf-panel) 40%, transparent), inset -1px -1px 3px var(--lf-neu-light);
}
.lf-link-card .lf-card-info { flex: 1; min-width: 0; }
.lf-link-card .lf-card-name { font-weight: 700; font-size: 13px; color: var(--lf-text); }
.lf-link-card .lf-card-url {
  font-size: 11px; color: var(--lf-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lf-link-card .lf-card-bypass { font-size: 11px; font-weight: 600; color: #4ade80; margin-top: 2px; }
.lf-link-card .lf-card-badge {
  padding: 3px 8px; border-radius: 8px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  background: color-mix(in srgb, var(--lf-accent) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--lf-text) 5%, transparent);
  color: var(--lf-accent); flex-shrink: 0;
  box-shadow: inset 1px 1px 3px color-mix(in srgb, var(--lf-panel) 30%, transparent), inset -1px -1px 2px var(--lf-neu-light);
}

.lf-footer { padding: 12px 20px 16px; background: transparent; }
.lf-input-row { display: flex; gap: 8px; align-items: center; }
.lf-input {
  flex: 1; padding: 12px 16px;
  border: 1px solid var(--lf-glass-border); border-radius: 14px;
  background: transparent; color: var(--lf-text);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
}
.lf-input:focus {
  border-color: var(--lf-accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--lf-accent) 15%, transparent);
}
.lf-input::placeholder { color: var(--lf-muted); opacity: 0.6; }

.lf-send {
  width: 44px; height: 44px;
  border: 1px solid color-mix(in srgb, var(--lf-text) 10%, transparent);
  border-radius: 14px;
  background: linear-gradient(135deg, var(--lf-accent), var(--lf-accent-deep));
  color: var(--lf-on-accent); font-size: 16px;
  cursor: pointer; transition: all 0.25s ease;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 3px 3px 10px var(--lf-neu-dark), -2px -2px 6px var(--lf-neu-light);
}
.lf-send:hover {
  transform: translateY(-2px);
  box-shadow: 4px 4px 14px var(--lf-neu-dark), -3px -3px 8px var(--lf-neu-light), 0 4px 18px var(--lf-accent-shadow);
}
.lf-send:disabled {
  opacity: 0.35; cursor: not-allowed; transform: none;
  box-shadow: 2px 2px 6px var(--lf-neu-dark), -1px -1px 3px var(--lf-neu-light);
}

.lf-hint { text-align: center; font-size: 11px; color: var(--lf-muted); opacity: 0.5; margin-top: 6px; }

.lf-cooldown-banner {
  text-align: center; padding: 10px 16px; margin: 0 20px 4px;
  border-radius: 14px;
  background: color-mix(in srgb, #f59e0b 8%, transparent);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid color-mix(in srgb, #f59e0b 20%, transparent);
  color: #fbbf24; font-size: 13px; font-weight: 600;
  animation: lf-fadeIn 0.3s ease;
  box-shadow: 3px 3px 10px var(--lf-neu-dark), -2px -2px 6px var(--lf-neu-light);
}

@keyframes lf-fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes lf-slideRight { from { opacity: 0; transform: translateX(30px) scale(0.9); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes lf-slideLeft { from { opacity: 0; transform: translateX(-30px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes lf-bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

@media (max-width: 640px) {
  .lf-intro-content h1 { font-size: 24px; }
  .lf-strict-btn { width: 34px; height: 34px; font-size: 12px; }
  .lf-msg { max-width: 90%; }
  .lf-scroll { padding: 12px; }
  .lf-footer { padding: 8px 12px 12px; }
}
  </style>
</head>
<body>

<div class="lf">
  <div class="lf-app">
    <div class="lf-chat">
      <!-- Intro screen -->
      <div class="lf-intro" id="lf-intro">
        <div class="lf-intro-content">
          <h1>Link Finder</h1>
          <p>Tell me about your school's internet restrictions and I'll find links that work for you.</p>
          <div class="lf-quick-start">
            <p class="lf-quick-label">What's your school's strictness level?</p>
            <div class="lf-strictness-picker" id="lf-strictness-picker">
              <button class="lf-strict-btn" data-level="1">1</button>
              <button class="lf-strict-btn" data-level="2">2</button>
              <button class="lf-strict-btn" data-level="3">3</button>
              <button class="lf-strict-btn" data-level="4">4</button>
              <button class="lf-strict-btn" data-level="5">5</button>
              <button class="lf-strict-btn" data-level="6">6</button>
              <button class="lf-strict-btn" data-level="7">7</button>
              <button class="lf-strict-btn" data-level="8">8</button>
              <button class="lf-strict-btn" data-level="9">9</button>
              <button class="lf-strict-btn" data-level="10">10</button>
            </div>
            <div class="lf-scale-labels">
              <span>Barely blocked</span>
              <span>Maximum filtering</span>
            </div>
          </div>
          <div class="lf-blocker-chips" id="lf-blocker-chips">
            <p class="lf-quick-label">Does your school use any of these? <span class="lf-optional">(optional)</span></p>
            <div class="lf-chips">
              <button class="lf-chip" data-blocker="fortiguard">FortiGuard</button>
              <button class="lf-chip" data-blocker="lightspeed">Lightspeed</button>
              <button class="lf-chip" data-blocker="palo alto">Palo Alto</button>
              <button class="lf-chip" data-blocker="blocksi web">Blocksi Web</button>
              <button class="lf-chip" data-blocker="blocksi ai">Blocksi AI</button>
              <button class="lf-chip" data-blocker="linewize">Linewize</button>
              <button class="lf-chip" data-blocker="cisco umbrella">Cisco Umbrella</button>
              <button class="lf-chip" data-blocker="securly">Securly</button>
              <button class="lf-chip" data-blocker="goguardian">GoGuardian</button>
              <button class="lf-chip" data-blocker="lanschool">LanSchool</button>
              <button class="lf-chip" data-blocker="contentkeeper">ContentKeeper</button>
              <button class="lf-chip" data-blocker="aristotlek12">AristotleK12</button>
              <button class="lf-chip" data-blocker="senso cloud">Senso Cloud</button>
              <button class="lf-chip" data-blocker="deledao">Deledao</button>
              <button class="lf-chip" data-blocker="iboss">iBoss</button>
              <button class="lf-chip" data-blocker="sophos">Sophos</button>
              <button class="lf-chip" data-blocker="barracuda">Barracuda</button>
              <button class="lf-chip" data-blocker="qustodio">Qustodio</button>
              <button class="lf-chip" data-blocker="dns filter">DNS Filter</button>
            </div>
          </div>
          <button class="lf-go-btn" id="lf-go-btn" disabled>
            <i class="fas fa-search"></i> Find Links
          </button>
        </div>
      </div>

      <!-- Chat messages -->
      <div class="lf-scroll" id="lf-scroll" aria-live="polite"></div>
    </div>

    <!-- Input footer -->
    <div class="lf-footer">
      <div class="lf-input-row">
        <input id="lf-prompt" class="lf-input" placeholder="Describe your school's setup..." autocomplete="off" maxlength="500" />
        <button id="lf-send" class="lf-send" title="Send" aria-label="Send message">
          <i class="fas fa-arrow-up"></i>
        </button>
      </div>
      <div class="lf-hint">Tip: mention your strictness level (1-10) and blocker name for best results</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// Config (inline)
// ═══════════════════════════════════════════════════════
let _CONFIG = {
  linkFinderApiUrl: "https://o9xip5w3zi.execute-api.us-east-2.amazonaws.com"
};

// ═══════════════════════════════════════════════════════
// Link Finder JS (from linkfinder.js)
// ═══════════════════════════════════════════════════════
(function () {
  'use strict';

  const API_URL = (typeof _CONFIG !== 'undefined' && _CONFIG.linkFinderApiUrl)
    ? _CONFIG.linkFinderApiUrl
    : '';

  // ─── State ─────────────────────────────────────────────────
  let conversationHistory = [];
  let userContext = { strictness: null, blockers: [] };
  let isWaiting = false;
  let cooldownUntil = 0;
  let pendingLinks = [];

  const SESSION_ID = sessionStorage.getItem('lf-session') || (() => {
    const id = crypto.randomUUID();
    sessionStorage.setItem('lf-session', id);
    return id;
  })();

  const savedCooldown = parseInt(localStorage.getItem('lf-cooldown') || '0', 10);
  if (savedCooldown > Date.now()) {
    cooldownUntil = savedCooldown;
  }

  // ─── DOM refs ──────────────────────────────────────────────
  const intro    = document.getElementById('lf-intro');
  const scroll   = document.getElementById('lf-scroll');
  const input    = document.getElementById('lf-prompt');
  const sendBtn  = document.getElementById('lf-send');
  const goBtn    = document.getElementById('lf-go-btn');
  const picker   = document.getElementById('lf-strictness-picker');
  const chipWrap = document.getElementById('lf-blocker-chips');

  // ─── Onboarding: Strictness picker ────────────────────────
  picker.addEventListener('click', (e) => {
    const btn = e.target.closest('.lf-strict-btn');
    if (!btn) return;
    picker.querySelectorAll('.lf-strict-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    userContext.strictness = parseInt(btn.dataset.level, 10);
    goBtn.disabled = false;
  });

  // ─── Onboarding: Blocker chips ────────────────────────────
  chipWrap.addEventListener('click', (e) => {
    const chip = e.target.closest('.lf-chip');
    if (!chip) return;
    chip.classList.toggle('active');
    const blocker = chip.dataset.blocker;
    if (chip.classList.contains('active')) {
      if (!userContext.blockers.includes(blocker)) userContext.blockers.push(blocker);
    } else {
      userContext.blockers = userContext.blockers.filter(b => b !== blocker);
    }
  });

  // ─── Onboarding: Go button ────────────────────────────────
  goBtn.addEventListener('click', () => {
    if (!userContext.strictness) return;
    let msg = `My school's strictness level is ${userContext.strictness}/10.`;
    if (userContext.blockers.length > 0) {
      msg += ` They use ${userContext.blockers.join(', ')}.`;
    }
    msg += ' What links work for me?';
    intro.classList.add('hidden');
    pendingLinks = [];
    sendMessage(msg);
  });

  // ─── Chat: Send ───────────────────────────────────────────
  sendBtn.addEventListener('click', handleSend);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  function handleSend() {
    if (cooldownUntil > Date.now()) { showCooldownBanner(); return; }
    const text = input.value.trim();
    if (!text || isWaiting) return;
    input.value = '';
    if (!intro.classList.contains('hidden')) { intro.classList.add('hidden'); }
    if (pendingLinks.length > 0 && isNextLinkRequest(text)) { serveNextLink(text); return; }
    sendMessage(text);
  }

  function isNextLinkRequest(text) {
    const t = text.toLowerCase();
    const phrases = [
      'didn\'t work', 'didnt work', 'doesn\'t work', 'doesnt work',
      'not work', 'blocked', 'another', 'next', 'try again',
      'give me another', 'next one', 'another one', 'new link',
      'different link', 'different one', 'still blocked', 'nope',
      'no luck', 'failed', 'got blocked',
    ];
    return phrases.some(p => t.includes(p));
  }

  function serveNextLink(userText) {
    appendMessage('user', userText);
    conversationHistory.push({ role: 'user', content: userText });
    const nextLink = pendingLinks.shift();
    const remaining = pendingLinks.length;
    let reply = 'Here\'s another link to try:';
    if (remaining > 0) {
      reply += ` I still have **${remaining}** more if this one doesn't work.`;
    } else {
      reply += ' This is the last one I have for your setup.';
    }
    appendMessage('bot', reply, [nextLink]);
    conversationHistory.push({ role: 'assistant', content: reply });
    input.value = '';
    input.focus();
  }

  async function sendMessage(text) {
    isWaiting = true;
    sendBtn.disabled = true;
    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    const typing = showTyping();

    try {
      const result = await callAPI(text);
      typing.remove();
      const validated = validateLinks(result.links, result.reply);
      appendMessage('bot', validated.reply, validated.links);
      conversationHistory.push({ role: 'assistant', content: validated.reply });

      if (result.cooldown) {
        cooldownUntil = result.cooldown.until || (Date.now() + (result.cooldown.hours || 1) * 3600000);
        localStorage.setItem('lf-cooldown', String(cooldownUntil));
        showCooldownBanner();
      }
      if (result.retryAfter) {
        cooldownUntil = Date.now() + result.retryAfter * 1000;
        localStorage.setItem('lf-cooldown', String(cooldownUntil));
        showCooldownBanner();
      }
    } catch (err) {
      typing.remove();
      appendMessage('bot', "Sorry, I couldn't reach the server. Please try again in a moment.");
      console.error('Link Finder API error:', err);
    }

    isWaiting = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ─── API Call ─────────────────────────────────────────────
  function validateLinks(links, reply) {
    if (!links || links.length === 0) return { links: [], reply };
    const selectedBlockers = userContext.blockers.map(b => b.toLowerCase().trim());
    if (selectedBlockers.length === 0) return { links, reply };

    const validatedLinks = [];
    for (const link of links) {
      const linkBypasses = (link.bypasses || []).map(b => b.toLowerCase().trim());
      const matchedBlockers = selectedBlockers.filter(b => linkBypasses.includes(b));
      if (matchedBlockers.length > 0) {
        validatedLinks.push({
          ...link,
          bypasses: matchedBlockers.map(b => b.charAt(0).toUpperCase() + b.slice(1)),
        });
      }
    }

    if (validatedLinks.length === 0 && links.length > 0) {
      const blockerNames = userContext.blockers.join(', ');
      pendingLinks = [];
      return {
        links: [],
        reply: `I don't currently have any verified links that bypass **${blockerNames}**. I won't recommend links unless they're confirmed to work with your specific blocker. If you'd like, you can ask again later — new links are added regularly.`,
      };
    }

    const firstLink = validatedLinks[0];
    pendingLinks = validatedLinks.slice(1);
    const remaining = pendingLinks.length;
    let adjustedReply = reply;
    if (remaining > 0) {
      adjustedReply += `\n\nIf this link doesn't work, just let me know and I'll give you another one. I have **${remaining}** more to try.`;
    }
    return { links: [firstLink], reply: adjustedReply };
  }

  async function callAPI(message) {
    if (!API_URL) {
      return {
        reply: "**Link Finder is not configured yet.** Set the `linkFinderApiUrl` in the config at the top of this page.",
        links: [],
        source: 'error',
      };
    }

    const resp = await fetch(`${API_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        conversationHistory: conversationHistory.slice(-20),
        userContext,
        sessionId: SESSION_ID,
        instructions: 'STRICT RULES: 1) Only recommend links whose blockers array explicitly includes the user\'s selected blockers. Never claim a link bypasses a blocker unless that blocker is in the link\'s verified data. If no links match, say so honestly instead of guessing. 2) Only return ONE link at a time. If the user says it does not work, return the next single link. Never return multiple links in one response.',
      }),
    });

    if (!resp.ok && resp.status !== 429) {
      throw new Error(`API returned ${resp.status}`);
    }
    return await resp.json();
  }

  // ─── UI: Append message ───────────────────────────────────
  function appendMessage(role, text, links) {
    const div = document.createElement('div');
    div.className = `lf-msg ${role}`;

    if (role === 'bot') {
      div.innerHTML = renderMarkdown(text);
      if (links && links.length > 0) {
        const cards = document.createElement('div');
        cards.className = 'lf-link-cards';
        links.forEach(l => {
          const a = document.createElement('a');
          a.className = 'lf-link-card';
          a.href = l.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          const bypassHtml = (l.bypasses && l.bypasses.length > 0)
            ? `<div class="lf-card-bypass">\u2705 Gets past ${esc(l.bypasses.map(b => b.charAt(0).toUpperCase() + b.slice(1)).join(', '))}</div>`
            : '';
          a.innerHTML = `
            <div class="lf-card-icon"><i class="fas fa-globe"></i></div>
            <div class="lf-card-info">
              <div class="lf-card-name">${esc(l.name)}</div>
              <div class="lf-card-url">${esc(l.url)}</div>
              ${bypassHtml}
            </div>
            <div class="lf-card-badge">${esc(l.hostingType || 'link')}</div>
          `;
          cards.appendChild(a);
        });
        div.appendChild(cards);
      }
    } else {
      div.textContent = text;
    }
    scroll.appendChild(div);
    scroll.scrollTop = scroll.scrollHeight;
  }

  // ─── UI: Typing indicator ────────────────────────────────
  function showTyping() {
    const div = document.createElement('div');
    div.className = 'lf-typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    scroll.appendChild(div);
    scroll.scrollTop = scroll.scrollHeight;
    return div;
  }

  // ─── Markdown-lite renderer ──────────────────────────────
  function renderMarkdown(text) {
    let html = esc(text);
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  // ─── Cooldown UI ───────────────────────────────────────────
  function showCooldownBanner() {
    let banner = document.querySelector('.lf-cooldown-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.className = 'lf-cooldown-banner';
      const footer = document.querySelector('.lf-footer');
      if (footer) footer.parentNode.insertBefore(banner, footer);
    }
    input.disabled = true;
    sendBtn.disabled = true;

    function tick() {
      const left = cooldownUntil - Date.now();
      if (left <= 0) {
        banner.remove();
        input.disabled = false;
        sendBtn.disabled = false;
        cooldownUntil = 0;
        localStorage.removeItem('lf-cooldown');
        return;
      }
      const h = Math.floor(left / 3600000);
      const m = Math.floor((left % 3600000) / 60000);
      banner.textContent = h > 0
        ? `\u23F3 You can chat again in ${h}h ${m}m`
        : `\u23F3 You can chat again in ${m} minute${m !== 1 ? 's' : ''}`;
      setTimeout(tick, 30000);
    }
    tick();
  }

  if (cooldownUntil > Date.now()) showCooldownBanner();

  window.NexoraLinkFinder = { version: '1.0.0' };
})();
</script>

</body>
</html>
