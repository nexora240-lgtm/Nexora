<!DOCTYPE html>
<html>
<head>
    <meta name="google-adsense-account" content="ca-pub-6990835730345530">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexora</title>
<style>
*{margin:0;padding:0}html,body{height:100%;overflow:hidden}
</style>
</head>
<body>
<div id="c" style="width:100%;height:100%"></div>
<script>
(function () {
  var MIRROR_URL = "https://bk3oncqvwtrfu4kwltjvbptpke0gvamm.lambda-url.us-east-2.on.aws/";

  window.addEventListener("load", function () {
    var iframe = document.createElement("iframe");
    iframe.style.cssText = "width:100%;height:100%;border:none;position:fixed;top:0;left:0;";
    iframe.setAttribute("allowfullscreen", "");

    var origin = new URL(MIRROR_URL).origin;

    var fi = document.createElement("link");
    fi.rel = "icon";
    fi.href = origin + "/favicon.ico";
    document.head.appendChild(fi);

    var setFav = function (h) {
      if (!h) return;
      if (h.indexOf("//") === 0) h = "https:" + h;
      else if (h.charAt(0) === "/") h = origin + h;
      else if (h.indexOf("http") !== 0 && h.indexOf("data:") !== 0 && h.indexOf("blob:") !== 0) h = origin + "/" + h;
      var nf = document.createElement("link");
      nf.rel = "icon";
      nf.href = h;
      if (fi.parentNode) fi.parentNode.removeChild(fi);
      document.head.appendChild(nf);
      fi = nf;
    };

    setTimeout(function () {
      iframe.src = MIRROR_URL;
      document.getElementById("c").appendChild(iframe);
    }, 0);

    window.addEventListener("message", function (m) {
      if (m.data) {
        if (m.data.title) document.title = m.data.title;
        var fav = m.data.type === "nexora:faviconChange" ? m.data.href : m.data.favicon;
        setFav(fav);
      }
    });
  });
})();
</script>
</body>
</html>
