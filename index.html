  <script>
    (function () {
      try {
        var THEME_KEY = 'settings.theme';
        var SCHEME_KEY = 'settings.colorScheme';
        var MAP = {
          'midnight-amber': 'theme-midnight-amber',
          'midnight-blueberry': 'theme-midnight-blueberry',
          'midnight-grape': 'theme-midnight-grape'
        };

        var savedTheme = null;
        var savedScheme = null;
        try {
          savedTheme = localStorage.getItem(THEME_KEY);
          savedScheme = localStorage.getItem(SCHEME_KEY);
        } catch (e) {
          savedTheme = null;
          savedScheme = null;
        }

        var doc = document.documentElement;

        if (savedScheme === 'light') {
          doc.classList.add('light-scheme');
          doc.classList.remove('theme-midnight-amber','theme-midnight-blueberry','theme-midnight-grape');
          doc.setAttribute('data-restored-theme', 'light');
        } else {
          var cls = (savedTheme && MAP[savedTheme]) ? MAP[savedTheme] : null;
          if (!cls) {
            if (!doc.classList.contains('theme-midnight-amber') &&
                !doc.classList.contains('theme-midnight-blueberry') &&
                !doc.classList.contains('theme-midnight-grape') &&
                !doc.classList.contains('light-scheme')) {
              cls = 'theme-midnight-amber';
            }
          }
          if (cls) {
            doc.classList.remove('light-scheme','theme-midnight-amber','theme-midnight-blueberry','theme-midnight-grape');
            doc.classList.add(cls);
            doc.setAttribute('data-restored-theme', cls.replace('theme-',''));
          } else {
            doc.setAttribute('data-restored-theme', 'default');
          }
        }
      } catch (err) {
      }
    })();
  </script>

  <script>
  // Register SW on every page load and force-update stale workers
  if ('serviceWorker' in navigator) {
    // Auto-reload when a new service worker activates.
    // The guard prevents an infinite reload loop: the new SW sends its
    // version, and we only reload if the page hasn't already reloaded for
    // that version.
    var _swReloadedKey = 'nexora_sw_reloaded';
    navigator.serviceWorker.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'SW_UPDATED') {
        var reloadedFor = sessionStorage.getItem(_swReloadedKey);
        if (reloadedFor === event.data.version) return; // already reloaded for this version
        sessionStorage.setItem(_swReloadedKey, event.data.version);
        console.log('New service worker version', event.data.version, '— reloading page');
        window.location.reload();
      }
    });

    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      // Immediately check for a newer sw.js from the server
      reg.update().catch(function() {});
      // When a new SW is found and installed, take over immediately
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        if (newWorker) {
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'activated') {
              console.log('Service worker updated — new version active');
            }
          });
        }
      });
    }).catch(function(err) {
      console.warn('SW registration failed:', err);
    });
  }
  </script>

  <!-- Persistent home visuals: load once, scroll forever -->
  <script>
  (function() {
    var loaded = false;
    function initHomeVisuals() {
      if (loaded) return;
      loaded = true;

      fetch('/game-info.json')
        .then(function(res) { return res.json(); })
        .then(function(allGames) {
          // Filter to only displayable games, then shuffle
          var games = allGames.filter(function(g) { return g.display === true; });
          for (var i = games.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = games[i]; games[i] = games[j]; games[j] = tmp;
          }

          // Shared pool — each card pulls the next game
          var poolIdx = 0;
          function nextGame() {
            return poolIdx < games.length ? games[poolIdx++] : null;
          }

          var CARDS_PER_COL = 8;

          // Build a single card; calls onDone(card) on success or onDone(null)
          function buildCard(onDone) {
            var game = nextGame();
            if (!game) { onDone(null); return; }

            var card  = document.createElement('a');
            card.href = '#';
            card.className = 'home-card';
            card.dataset.route = '/games';

            var inner = document.createElement('div');
            inner.className = 'home-card-inner';
            var img   = document.createElement('img');
            img.alt   = '';
            img.decoding = 'async';
            var ov    = document.createElement('div');
            ov.className = 'home-card-ov';
            var span  = document.createElement('span');
            ov.appendChild(span);
            inner.appendChild(img);
            inner.appendChild(ov);
            card.appendChild(inner);

            function tryLoad(g) {
              if (!g || !g.thumbnail) {
                var nx = nextGame();
                if (nx) { tryLoad(nx); return; }
                onDone(null); return;
              }
              card.dataset.game = g.title;
              span.textContent  = g.title;
              img.onload  = function() { onDone(card); };
              img.onerror = function() {
                var nx = nextGame();
                if (nx) { tryLoad(nx); } else { onDone(null); }
              };
              img.src = g.thumbnail;
            }
            tryLoad(game);
          }

          // Fill a track, then clone valid cards for seamless infinite scroll
          function fillTrack(trackId) {
            var el = document.getElementById(trackId);
            if (!el) return;
            var resolved = 0;
            var slots = new Array(CARDS_PER_COL);

            for (var i = 0; i < CARDS_PER_COL; i++) {
              (function(idx) {
                buildCard(function(card) {
                  slots[idx] = card;
                  resolved++;
                  if (resolved === CARDS_PER_COL) {
                    var frag = document.createDocumentFragment();
                    for (var k = 0; k < slots.length; k++) {
                      if (slots[k]) frag.appendChild(slots[k]);
                    }
                    // Clone for seamless loop
                    for (var k = 0; k < slots.length; k++) {
                      if (slots[k]) frag.appendChild(slots[k].cloneNode(true));
                    }
                    el.appendChild(frag);
                  }
                });
              })(i);
            }
          }

          fillTrack('home-t1');
          fillTrack('home-t2');
          fillTrack('home-t3');

          if (window.NexoraMouseTracking) {
            var visuals = document.getElementById('home-bg-visuals');
            if (visuals) window.NexoraMouseTracking.bindDelegated(visuals, '.home-card-inner');
          }
        })
        .catch(function(e) {
          console.error('Home visuals error:', e);
          loaded = false;
        });
    }

    // Use requestIdleCallback to defer non-critical home visuals
    if ('requestIdleCallback' in window) {
      requestIdleCallback(initHomeVisuals, {timeout: 2000});
    } else if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initHomeVisuals);
    } else {
      initHomeVisuals();
    }
  })();
  </script>

  <script>
    window._nexoraTheme = {
      setTheme: function (themeId) {
        var map = {
          'midnight-amber': 'theme-midnight-amber',
          'midnight-blueberry': 'theme-midnight-blueberry',
          'midnight-grape': 'theme-midnight-grape'
        };
        if (!map[themeId]) return;
        document.documentElement.classList.remove('light-scheme','theme-midnight-amber','theme-midnight-blueberry','theme-midnight-grape');
        document.documentElement.classList.add(map[themeId]);
        try { localStorage.setItem('settings.theme', themeId); } catch (e) {}
        document.dispatchEvent(new CustomEvent('settings:themeChanged', { detail: { theme: themeId } }));
      },
      setScheme: function (scheme) {
        if (scheme === 'light') {
          document.documentElement.classList.add('light-scheme');

          const savedTheme = localStorage.getItem('settings.theme') || 'midnight-amber';
          const themeClass = 'theme-' + savedTheme;
          document.documentElement.classList.remove('theme-midnight-amber','theme-midnight-blueberry','theme-midnight-grape');
          document.documentElement.classList.add(themeClass);
          try { localStorage.setItem('settings.colorScheme', 'light'); } catch (e) {}
        } else {
          document.documentElement.classList.remove('light-scheme');

          const savedTheme = localStorage.getItem('settings.theme') || 'midnight-amber';
          const themeClass = 'theme-' + savedTheme;
          document.documentElement.classList.remove('theme-midnight-amber','theme-midnight-blueberry','theme-midnight-grape');
          document.documentElement.classList.add(themeClass);
          try { localStorage.setItem('settings.colorScheme', 'dark'); } catch (e) {}
        }
        document.dispatchEvent(new CustomEvent('settings:colorSchemeChanged', { detail: { scheme: scheme } }));
      }
    };
  </script>

  <script>
    // Defer particles loading until browser is idle
    function _initParticlesWhenReady() {
      // Check if particles are enabled (default true)
      let particlesEnabled = true;
      try {
        const savedParticles = localStorage.getItem('settings.particles');
        if (savedParticles !== null) {
          particlesEnabled = JSON.parse(savedParticles);
        }
      } catch (e) {
        particlesEnabled = true;
      }

      function loadParticlesLib(ready) {
        if (window.particlesJS) {
          ready();
          return;
        }

        var existing = document.getElementById('particles-js-lib');
        if (existing) {
          existing.addEventListener('load', ready, { once: true });
          return;
        }

        var script = document.createElement('script');
        script.id = 'particles-js-lib';
        script.src = 'https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js';
        script.async = true;
        script.onload = ready;
        document.head.appendChild(script);
      }

      function initParticles() {
        if (!document.getElementById('particles-js')) {
          var div = document.createElement('div');
          div.id = 'particles-js';
          div.style.position = 'fixed';
          div.style.top = '0';
          div.style.left = '0';
          div.style.width = '100%';
          div.style.height = '100%';
          div.style.zIndex = '-1';
          div.style.pointerEvents = 'none';
          document.body.appendChild(div);
        }

        loadParticlesLib(function() {
          var cfg = {

                }

                  "sync": false
                }
              },
              "size": {
                "value": 7,
                "random": true,
                "anim": {
                  "enable": false,
                  "speed": 71.71429026757396,
                  "size_min": 0.1,
                  "sync": false
                }
              },
              "line_linked": {
                "enable": false,
                "distance": 150,
                "color": "#ffffff",
                "opacity": 0.1,
                "width": 1
              },
              "move": {
                "enable": true,
                "speed": 1,
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false,
                "attract": {
                  "enable": false,
                  "rotateX": 600,
                  "rotateY": 1200
                }
              }
            },
            "interactivity": {
              "detect_on": "canvas",
              "events": {
                "onhover": {
                  "enable": true,
                  "mode": "bubble"
                },
                "onclick": {
                  "enable": true,
                  "mode": "repulse"
                },
                "resize": true
              },
              "modes": {
                "grab": {
                  "distance": 400,
                  "line_linked": {
                    "opacity": 1
                  }
                },
                "bubble": {
                  "distance": 286.85716107029583,
                  "size": 7.968254474174885,
                  "duration": 2.1514287080272188,
                  "opacity": 8,
                  "speed": 3
                },
                "repulse": {
                  "distance": 113.14228450435593,
                  "duration": 0.4
                },
                "push": {
                  "particles_nb": 4
                },
                "remove": {
                  "particles_nb": 2
                }
              }
            },
            "retina_detect": true
          };

          particlesJS('particles-js', cfg);
        });
      }

      function removeParticles() {
        var particlesDiv = document.getElementById('particles-js');
        if (particlesDiv) {
          particlesDiv.remove();
        }
        // Also destroy pJSDom if particles.js loaded
        if (window.pJSDom && window.pJSDom.length > 0) {
          window.pJSDom = [];
        }
      }

      function scheduleInitParticles() {
        if ('requestIdleCallback' in window) {
          requestIdleCallback(initParticles, { timeout: 2000 });
        } else {
          setTimeout(initParticles, 200);
        }
      }

      // Initialize or remove based on saved preference
      if (particlesEnabled) {
        scheduleInitParticles();
      }

      // Listen for settings changes
      document.addEventListener('settings:particlesToggled', function(e) {
        if (e.detail.enabled) {
          scheduleInitParticles();
        } else {
          removeParticles();
        }
      });
    }
    // Defer entire particle system initialization
    if ('requestIdleCallback' in window) {
      requestIdleCallback(_initParticlesWhenReady, {timeout: 4000});
    } else {
      setTimeout(_initParticlesWhenReady, 1000);

  <script>
    const LOGO_MAP = {
      'midnight-amber': 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-amber.png',
      'midnight-blueberry': 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-blueberry.png',
      'midnight-grape': 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-grape.png'
    };

    const FAVICON_MAP = {
      'midnight-amber': 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-amber.png',
      'midnight-blueberry': 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-blueberry.png',
      'midnight-grape': 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-grape.png'
    };

    const DEFAULT_LOGO = 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-amber.png';
    const DEFAULT_FAVICON = 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@main/logos/nexora-amber.png';

    function updateLogoAndFavicon() {
      const logo = document.querySelector('.sidebar-title img');
      const favicon = document.getElementById('favicon');
      const isLight = document.documentElement.classList.contains('light-scheme');
      
      if (isLight) {
        if (logo) logo.src = DEFAULT_LOGO;
        if (favicon) favicon.href = DEFAULT_FAVICON;
      } else {
        let savedTheme = null;
        try {
          savedTheme = localStorage.getItem('settings.theme');
        } catch (e) {}

        const logoSrc = (savedTheme && LOGO_MAP[savedTheme]) ? LOGO_MAP[savedTheme] : DEFAULT_LOGO;
        const faviconHref = (savedTheme && FAVICON_MAP[savedTheme]) ? FAVICON_MAP[savedTheme] : DEFAULT_FAVICON;

        if (logo) logo.src = logoSrc;
        if (favicon) favicon.href = faviconHref;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      updateLogoAndFavicon();
    });

    document.addEventListener('settings:colorSchemeChanged', function(e) {
      updateLogoAndFavicon();
    });

    document.addEventListener('settings:themeChanged', function(e) {
      updateLogoAndFavicon();
    });
  </script>

<script>
  // Maintenance mode + Announcement notifications
  (function() {
    const API = (typeof _CONFIG !== 'undefined' && _CONFIG.adminApiUrl) || '';
    if (!API) return;

    // ── Maintenance Mode ──
    fetch(API + '/site/settings').then(function(r) { return r.json(); }).then(function(res) {
      var s = res.settings || {};
      if (s.maintenanceMode !== 'true') return;

      // Let admins through
      function checkAdmin() {
        return window.NexoraAuth && window.NexoraAuth.isAdmin();
      }

      // If auth hasn't resolved yet, wait for it
      function tryBlock() {
        if (checkAdmin()) return; // admin — don't block

        // Create full-screen overlay that blocks everything
        var overlay = document.createElement('div');
        overlay.id = 'maintenance-overlay';
        overlay.innerHTML =
          '<div class="maintenance-card">' +
            '<div class="maintenance-icon"><i class="fas fa-wrench"></i></div>' +
            '<h1>Under Maintenance</h1>' +
            '<p>Nexora is temporarily down for scheduled maintenance.<br>We\'ll be back shortly.</p>' +
            '<div class="maintenance-pulse"></div>' +
          '</div>';
        document.body.appendChild(overlay);

        // Block SPA routing by preventing all link clicks & popstate
        window.addEventListener('popstate', function(e) { e.stopImmediatePropagation(); }, true);
        document.addEventListener('click', function(e) {
          var link = e.target.closest('a[data-route], a[href]');
          if (link) { e.preventDefault(); e.stopImmediatePropagation(); }
        }, true);
      }

      if (window.NexoraAuth && window.NexoraAuth.authResolved) {
        tryBlock();
      } else if (window.NexoraAuth) {
        window.NexoraAuth.onAuthChange(function() {
          if (window.NexoraAuth.authResolved) tryBlock();
        });
      } else {
        tryBlock();
      }
    }).catch(function(){});

    // ── Announcement Notifications (unified) ──
    fetch(API + '/announcements/active').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.announcements || [];
      if (!list.length) return;

      list.forEach(function(a) {
        var dismissed = sessionStorage.getItem('ann_dismiss_' + a.id);
        if (dismissed) return;

        var notif = NexoraNotify.announce(a.title || '', a.message || '');
        // Store dismiss in sessionStorage when user closes
        var origClose = notif.el.querySelector('.nxn-close');
        if (origClose) {
          origClose.addEventListener('click', function() {
            sessionStorage.setItem('ann_dismiss_' + a.id, '1');
          });
        }
      });
    }).catch(function(){});
  })();
</script>
</body>
</html>
