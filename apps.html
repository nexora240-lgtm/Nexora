<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (window.location.pathname.endsWith('/apps.html')) {
      const params = window.location.search;
      window.location.replace('/?route=/apps' + (params ? '&' + params.substring(1) : ''));
    }
  </script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7925754855607435"
     crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H5VGHQJKD8"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-H5VGHQJKD8', {transport_type: 'beacon'});
  </script>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer-when-downgrade" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apps - Nexora</title>
  <link rel="stylesheet" href="css/_tokens.css" />
  <link rel="stylesheet" href="css/apps.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" /></noscript>
  <script src="config.js"></script>
  <script src="js/mouse-tracking.js"></script>
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="apps-bg-orbs" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <div class="apps-container">
    <div class="apps-header">
      <h1 class="apps-title">Apps</h1>
      <p class="apps-subtitle">Browse and launch your favorite applications</p>
    </div>

    <div class="search-bar">
      <div class="container">
        <div class="input-row" id="searchRow">
          <input
            class="input"
            id="searchInput"
            type="text"
            placeholder="Search apps..."
            autocomplete="off"
          />
          <button class="search-clear" id="searchClear" aria-label="Clear search">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="apps-grid" id="appsGrid"></div>
  </div>

  <script>
  (function() {
    let allApps = [];
    let filteredApps = [];
    const grid = document.getElementById('appsGrid');
    const searchInput = document.getElementById('searchInput');
    const searchRow  = document.getElementById('searchRow');
    const searchClear = document.getElementById('searchClear');

    // Mouse tracking highlight for app cards
    function bindCardHighlight(card) {
      if (!window.NexoraMouseTracking) return;
      window.NexoraMouseTracking.bindElement(card);
    }

    // Render skeleton while loading
    function showSkeletons(count = 12) {
      grid.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'skeleton';
        s.innerHTML = '<div class="skeleton-icon"></div><div class="skeleton-label"></div>';
        frag.appendChild(s);
      }
      grid.appendChild(frag);
    }

    // Load apps from JSON
    async function loadApps() {
      showSkeletons();
      try {
        const response = await fetch('/app-info.json');
        allApps = await response.json();
        filteredApps = [...allApps];
        renderApps();
      } catch (error) {
        console.error('Failed to load apps:', error);
        grid.innerHTML = '<div class="no-results"><div class="no-results-icon">⚠️</div>Failed to load apps. Please try again later.</div>';
      }
    }

    function createAppCard(app) {
      const card = document.createElement('div');
      card.className = 'app-card';
      card.innerHTML = `
        <div class="app-card-ring"></div>
        <div class="app-icon-wrapper">
          <img 
            class="app-icon" 
            src="${app.thumbnail}" 
            alt="${app.title}"
            onerror="this.src='https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets@latest/images/apps/default.png'"
            loading="lazy"
            decoding="async"
          />
        </div>
        <span class="app-name">${app.title}</span>
      `;
      
      card.addEventListener('click', () => {
        // Navigate to apploader with app info
        const url = `/apploader?app=${encodeURIComponent(app.title)}&link=${encodeURIComponent(app.link)}&thumb=${encodeURIComponent(app.thumbnail)}`;
        if (window.navigate && typeof window.navigate === 'function') {
          window.navigate(url);
        } else {
          window.location.href = url;
        }
      });
      
      // Bind mouse tracking highlight
      bindCardHighlight(card);
      
      return card;
    }

    function createAddAppCard() {
      const card = document.createElement('div');
      card.className = 'app-card add-app-card';
      card.innerHTML = `
        <div class="app-card-ring"></div>
        <div class="app-icon-wrapper">
          <div class="add-icon"></div>
        </div>
        <span class="app-name">Add App</span>
      `;
      
      card.addEventListener('click', () => {
        // Open Google Form directly (not through proxy)
        window.open('https://forms.gle/gwu2paejVJ6YREQL6', '_blank');
      });
      
      // Bind mouse tracking highlight
      bindCardHighlight(card);
      
      return card;
    }

    function renderApps() {
      grid.textContent = '';
      
      if (filteredApps.length === 0) {
        grid.innerHTML = '<div class="no-results">No apps found matching your search.</div>';
        return;
      }

      const fragment = document.createDocumentFragment();
      filteredApps.forEach((app, i) => {
        const card = createAppCard(app);
        card.style.setProperty('--card-index', i);
        fragment.appendChild(card);
      });

      // Add the "Add App" card at the end
      fragment.appendChild(createAddAppCard());
      grid.appendChild(fragment);
    }

    function filterApps(query) {
      const searchTerm = query.toLowerCase().trim();
      if (!searchTerm) {
        filteredApps = [...allApps];
      } else {
        filteredApps = allApps.filter(app =>
          app.title.toLowerCase().includes(searchTerm)
        );
      }
      renderApps();
    }

    // Search
    searchInput.addEventListener('input', (e) => {
      const val = e.target.value;
      searchRow.classList.toggle('has-value', val.length > 0);
      filterApps(val);
    });

    // Clear button
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchRow.classList.remove('has-value');
      filterApps('');
      searchInput.focus();
    });

    // Load apps on init
    loadApps();
  })();
  </script>

</body>
</html>
