  <style>
    .taboola-ad-row {
      grid-column: 1 / -1;
      width: 100%;
      min-height: 250px;
      padding: 10px 0;
    }

    /* ═══════════════════════════════════════════════
       Glassmorphism / Neumorphism Tokens (Games)
       ═══════════════════════════════════════════════ */
    :root {
      --glass-bg: color-mix(in srgb, var(--g-panel, #1a100d) 30%, transparent);
      --glass-bg-strong: color-mix(in srgb, var(--g-panel, #1a100d) 55%, transparent);
      --glass-border: color-mix(in srgb, var(--g-text, #f8e7e0) 8%, transparent);
      --glass-border-accent: color-mix(in srgb, var(--g-accent, #d4550a) 25%, transparent);
      --glass-blur: blur(24px) saturate(180%);
      --glass-highlight: color-mix(in srgb, var(--g-text, #f8e7e0) 4%, transparent);
      --neu-light: color-mix(in srgb, var(--g-text, #f8e7e0) 5%, transparent);
      --neu-dark: rgba(0, 0, 0, 0.5);
      --neu-raised: -4px -4px 12px var(--neu-light), 6px 6px 16px var(--neu-dark);
      --neu-flat: -2px -2px 6px var(--neu-light), 4px 4px 10px var(--neu-dark);
      --neu-inset: inset -3px -3px 8px var(--neu-light), inset 4px 4px 12px var(--neu-dark);
    }

    /* ═══════════════════════════════════════════════
       HERO SECTION — Games
       ═══════════════════════════════════════════════ */
    .games-hero {
      position: relative;
      width: calc(100% - 40px);
      max-width: 1200px;
      margin: 20px auto 32px;
      height: 46vh;
      min-height: 280px;
      max-height: 420px;
      display: flex;
      align-items: flex-end;
      padding: 0 4% 60px;
      overflow: hidden;
      z-index: 1;
      border-radius: calc(var(--g-radius) + 8px);
      contain: layout style;
    }

    .games-hero-backdrop {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
      transition: opacity 0.8s ease-in-out;
    }

    .games-hero-backdrop::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          transparent 0%,
          color-mix(in srgb, var(--g-page-bg) 20%, transparent) 30%,
          color-mix(in srgb, var(--g-page-bg) 70%, transparent) 65%,
          var(--g-page-bg) 100%),
        linear-gradient(90deg,
          color-mix(in srgb, var(--g-page-bg) 50%, transparent) 0%,
          transparent 60%);
    }

    .games-hero-fade {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 200px;
      background: linear-gradient(to top, var(--g-page-bg), transparent);
      z-index: 1;
    }

    .games-hero:hover .games-hero-content { }

    .games-hero-content {
      position: relative;
      z-index: 2;
      max-width: 620px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: calc(var(--g-radius) + 6px);
      padding: 32px 36px;
      animation: heroGlassIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow:
        var(--neu-raised),
        0 0 0 1px var(--glass-highlight),
        0 30px 60px -15px rgba(0, 0, 0, 0.5);
    }

    .games-hero-content::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1.5px;
      background: linear-gradient(
        135deg,
        color-mix(in srgb, var(--g-accent) 40%, transparent),
        transparent 40%,
        transparent 60%,
        color-mix(in srgb, var(--g-accent) 20%, transparent)
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.7;
      animation: heroBorderShimmer 6s ease-in-out infinite;
    }

    @keyframes heroBorderShimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes heroGlassIn {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.96);
        backdrop-filter: blur(0px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        backdrop-filter: var(--glass-blur);
      }
    }



    .games-hero-title {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 800;
      margin: 0 0 12px;
      line-height: 1.1;
      color: var(--g-text);
    }

    .games-hero-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
      font-size: 14px;
      color: var(--g-muted);
      flex-wrap: wrap;
    }

    .games-hero-views {
      color: color-mix(in srgb, var(--g-accent) 100%, #fff 20%);
      font-weight: 700;
    }

    .games-hero-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .games-hero-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .games-hero-btn-play {
      background: linear-gradient(135deg, var(--g-accent) 0%, var(--g-accent-deep) 100%);
      color: #fff;
      box-shadow: 0 6px 20px var(--g-shadow),
        inset 0 1px 0 color-mix(in srgb, #fff 15%, transparent),
        inset 0 -2px 0 color-mix(in srgb, #000 15%, transparent);
    }

    .games-hero-btn-play:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 10px 30px var(--g-shadow),
        inset 0 1px 0 color-mix(in srgb, #fff 20%, transparent);
    }

    .games-hero-btn-next {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--g-text);
      border: 1px solid var(--glass-border);
      box-shadow: var(--neu-flat);
    }

    .games-hero-btn-next:hover {
      background: color-mix(in srgb, var(--g-panel) 50%, transparent);
      transform: translateY(-3px);
      box-shadow: var(--neu-raised),
        0 0 20px color-mix(in srgb, var(--g-accent) 10%, transparent);
      border-color: var(--glass-border-accent);
    }

    /* ═══════════════════════════════════════════════
       GLASS SECTION FRAMES — Recently Played & Faves
       ═══════════════════════════════════════════════ */
    .game-section.glass-section {
      background: var(--glass-bg);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: calc(var(--g-radius) + 6px);
      padding: 28px 24px 20px;
      box-shadow: var(--neu-flat), 0 0 0 1px var(--glass-highlight);
      transition: box-shadow 0.4s ease, border-color 0.4s ease;
      overflow: visible;
      position: relative;
      contain: layout style;
    }

    /* Per-section mouse glow */
    .game-section.glass-section::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(
          600px circle at var(--x, 50%) var(--y, 50%),
          color-mix(in srgb, var(--g-accent) 6%, transparent) 0%,
          transparent 60%
        );
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 0;
    }

    .game-section.glass-section:hover::before { opacity: 1; }

    .game-section.glass-section:hover {
      box-shadow:
        var(--neu-raised),
        0 8px 32px -8px rgba(0, 0, 0, 0.35),
        0 0 0 1px var(--glass-highlight);
      border-color: var(--glass-border-accent);
    }

    /* Gradient border accent on hover */
    .game-section.glass-section::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        135deg,
        color-mix(in srgb, var(--g-accent) 30%, transparent),
        transparent 40%,
        transparent 60%,
        color-mix(in srgb, var(--g-accent) 15%, transparent)
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 1;
    }

    .game-section.glass-section:hover::after { opacity: 1; }

    /* Section title accent bar */
    .game-section.glass-section .section-header {
      position: relative;
      z-index: 2;
    }

    .game-section.glass-section .section-title {
      padding-left: 18px;
      position: relative;
    }

    .game-section.glass-section .section-title::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 70%;
      border-radius: 4px;
      background: linear-gradient(180deg, var(--g-accent), var(--g-accent-deep));
      box-shadow: 0 0 12px var(--g-shadow);
    }

    .game-section.glass-section .section-scroll-container {
      position: relative;
      z-index: 2;
    }

    /* Entrance animation for glass sections */
    .game-section.glass-section {
      animation: glassSectionIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes glassSectionIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Hero responsive */
    @media (max-width: 768px) {
      .games-hero {
        height: 55vh;
        min-height: 340px;
        padding: 0 16px 60px;
        width: calc(100% - 24px);
      }
      .games-hero-content {
        padding: 24px;
      }
      .games-hero-title {
        font-size: clamp(1.4rem, 5vw, 2rem);
      }
      .games-hero-meta {
        font-size: 13px;
      }
      .games-hero-btn {
        padding: 10px 22px;
        font-size: 14px;
      }
      .game-section.glass-section {
        padding: 20px 16px 16px;
      }
    }

    @media (max-width: 480px) {
      .games-hero {
        height: 50vh;
        min-height: 300px;
        padding: 0 12px 50px;
        width: calc(100% - 16px);
      }
      .games-hero-content {
        padding: 20px;
      }
      .games-hero-buttons {
        flex-direction: column;
      }
    }
  </style>

    .tag-filter-bar {

      align-items: center;

    .tag-pill {

      border: 1.5px solid var(--g-border);

      font-size: 0.82rem;
      font-weight: 600;

      white-space: nowrap;

    }
    .tag-pill:hover {
      background: color-mix(in srgb, var(--g-accent) 15%, var(--g-panel));
      border-color: color-mix(in srgb, var(--g-accent) 50%, transparent);
      color: var(--g-text);
      transform: translateY(-1px);
    }
    .tag-pill.active {
      background: linear-gradient(135deg, var(--g-accent), var(--g-accent-deep));
      color: var(--g-on-accent);
      border-color: var(--g-accent);
      box-shadow: 0 2px 12px color-mix(in srgb, var(--g-accent) 40%, transparent);
    }
    .tag-pill .tag-count {
      font-size: 0.72rem;
      opacity: 0.7;
      font-weight: 500;
    }
    .tag-pill.active .tag-count { opacity: 0.9; }
    .active-tags-summary {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 20px 0;
      max-width: 1200px;
      margin: 0 auto;
      font-size: 0.8rem;
      color: var(--g-muted);
    }
    .active-tags-summary.visible { display: flex; }
    .clear-tags-btn {
      padding: 3px 10px;
      background: color-mix(in srgb, var(--g-accent) 15%, transparent);
      color: var(--g-accent);
      border: 1px solid color-mix(in srgb, var(--g-accent) 30%, transparent);
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .clear-tags-btn:hover {
      background: var(--g-accent);
      color: var(--g-on-accent);
    }

    /* Game card tag badges */
    .game-card-tags {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      z-index: 2;
      max-width: calc(100% - 52px);
      pointer-events: none;
    }
    .game-card-tag {
      padding: 2px 8px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      color: #fff;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
  </style>

  <!-- Prebid + GPT: trigger ad auction on SPA navigation -->
  <script>
  (function() {
    try {

    // ============================================
    // HERO SECTION — Cycle through most popular games
    // ============================================
    (function initGamesHero() {
      const heroEl = document.getElementById('gamesHero');
      const heroBackdrop = document.getElementById('gamesHeroBackdrop');
      const heroTitle = document.getElementById('gamesHeroTitle');
      const heroViews = document.getElementById('gamesHeroViews');
      const heroCategory = document.getElementById('gamesHeroCategory');
      const heroPlayBtn = document.getElementById('gamesHeroPlayBtn');
      const heroNextBtn = document.getElementById('gamesHeroNextBtn');

      if (!heroEl) return;

      const HERO_CYCLE_DURATION = 8000; // 8 seconds per game
      let heroGames = [];
      let heroIndex = 0;
      let heroTimer = null;

      function getHeroGames() {
        const gamesWithViews = allGames
          .filter(g => g.thumbnail)
          .map(game => ({ game, views: viewsCache[game.title] || 0 }));
        return gamesWithViews
          .sort((a, b) => b.views - a.views)
          .slice(0, 10)
          .map(item => item.game);
      }

      function showHeroGame(index) {
        if (!heroGames.length) return;
        const game = heroGames[index % heroGames.length];

        // Crossfade backdrop
        heroBackdrop.style.opacity = '0';
        setTimeout(() => {
          heroBackdrop.style.backgroundImage = 'url(' + (game.thumbnail || '') + ')';
          heroBackdrop.style.opacity = '1';
        }, 300);

        heroTitle.textContent = game.title || 'Unknown';
        const vCount = viewsCache[game.title] || 0;
        heroViews.innerHTML = '<i class="fas fa-eye" style="margin-right:4px;font-size:0.85em;"></i> ' + ViewsAPI.formatCount(vCount) + ' views';
        heroCategory.textContent = game.category || '';

        // Play button
        heroPlayBtn.onclick = () => {
          sessionStorage.setItem('currentGame', JSON.stringify(game));
          RecentlyPlayedManager.add(game.title);
          if (window.GameStateManager) window.GameStateManager.setAutoplay(false);
          if (typeof navigate === 'function') navigate('/loader');
          else location.href = 'gameloader.html';
        };
      }

      function nextHero() {
        heroIndex = (heroIndex + 1) % heroGames.length;
        showHeroGame(heroIndex);
      }

      function startHeroCycle() {
        heroGames = getHeroGames();
        if (!heroGames.length) {
          heroEl.style.display = 'none';
          return;
        }
        heroEl.style.display = 'flex';
        showHeroGame(heroIndex);
        heroTimer = setInterval(nextHero, HERO_CYCLE_DURATION);
      }

      // Refresh hero with real stats without replaying the drop-in animation.
      // Called after ViewsAPI.fetchAll() resolves.
      function refreshHeroStats() {
        const newGames = getHeroGames();
        if (!newGames.length) return;

        clearInterval(heroTimer);
        heroGames = newGames;
        heroIndex = 0;

        const heroContent = heroEl.querySelector('.games-hero-content');

        if (heroEl.style.display === 'flex') {
          // Hero already visible — suppress animation so it doesn't replay
          if (heroContent) heroContent.style.animation = 'none';
          showHeroGame(heroIndex);
          // Re-enable animation after two frames so future first-shows still animate
          if (heroContent) {
            requestAnimationFrame(() => requestAnimationFrame(() => {
              heroContent.style.animation = '';
            }));
          }
        } else {
          // Hero was hidden (no games on first load) — show it normally with animation
          heroEl.style.display = 'flex';
          showHeroGame(heroIndex);
        }

        heroTimer = setInterval(nextHero, HERO_CYCLE_DURATION);
      }

      // Expose so ViewsAPI.fetchAll().then() can call it directly
      window.gamesHeroRefreshStats = refreshHeroStats;

      heroNextBtn.onclick = () => {
        clearInterval(heroTimer);
        nextHero();
        heroTimer = setInterval(nextHero, HERO_CYCLE_DURATION);
      };

      // Pause on hover
      heroEl.addEventListener('mouseenter', () => clearInterval(heroTimer));
      heroEl.addEventListener('mouseleave', () => {
        heroTimer = setInterval(nextHero, HERO_CYCLE_DURATION);
      });

      // Start immediately with cached/default data
      startHeroCycle();
      registerCleanup(() => {
        clearInterval(heroTimer);
        delete window.gamesHeroRefreshStats;
      });
    })();

    // Lightweight fuzzy scoring function
    function fuzzyScore(query, text) {
      if (!query) return 1; // empty query matches everything
      query = query.toLowerCase();
      text = text.toLowerCase();

      // Exact match highest
      if (text === query) return 1000;

      // Prefix / word-start boosts
      if (text.startsWith(query)) return 500;
      const words = text.split(/\s+/);
      for (const w of words) {
        if (w.startsWith(query)) return 400;
      }

      // Substring match (non-prefix) with position penalty
      const idx = text.indexOf(query);
      if (idx !== -1) {
        return 300 - idx;
      }

      // Sequential character match: all query chars appear in order
      let qIdx = 0;
      let score = 0;
      for (let i = 0; i < text.length && qIdx < query.length; i++) {
        if (text[i] === query[qIdx]) {
          // reward contiguous runs
          let contLen = 1;
          qIdx++;
          while (qIdx < query.length && i + 1 < text.length && text[i + 1] === query[qIdx]) {
            contLen++;
            i++;
            qIdx++;
          }
          score += contLen * 10;
        }
      }
      if (qIdx !== query.length) return -Infinity; // not a match

      // boost earlier first-char occurrence
      const firstCharPos = text.indexOf(query[0]);
      score += Math.max(0, 50 - firstCharPos);

      return score;
    }

    // Smooth scroll-to-top for page navigation (non-interruptible)
    let _scrollLocked = false;
    function smoothScrollToTop(callback) {
      const appEl = document.getElementById('app');
      const target = appEl || document.documentElement;
      const duration = 420; // ms
      const startY = target.scrollTop || window.scrollY;
      if (startY === 0) {
        if (callback) callback();
        return;
      }
      _scrollLocked = true;
      // Block wheel, touch, and keyboard scroll during animation
      const blockScroll = (e) => { e.preventDefault(); e.stopPropagation(); };
      const opts = { passive: false, capture: true };
      window.addEventListener('wheel', blockScroll, opts);
      window.addEventListener('touchmove', blockScroll, opts);
      window.addEventListener('keydown', blockScroll, opts);
      const startTime = performance.now();
      function ease(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const y = startY * (1 - ease(progress));
        if (appEl) appEl.scrollTop = y;
        window.scrollTo(0, y);
        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          if (appEl) appEl.scrollTop = 0;
          window.scrollTo(0, 0);
          window.removeEventListener('wheel', blockScroll, opts);
          window.removeEventListener('touchmove', blockScroll, opts);
          window.removeEventListener('keydown', blockScroll, opts);
          _scrollLocked = false;
          if (callback) callback();
        }
      }
      requestAnimationFrame(step);
    }

    // Render pagination controls
    function renderPagination(totalGames) {
      const totalPages = Math.ceil(totalGames / GAMES_PER_PAGE);
      const pagination = document.getElementById("pagination");
      
      if (!pagination) return;
      
      // Always show pagination container for consistency
      pagination.style.display = 'flex';
      pagination.innerHTML = "";

      if (totalPages <= 1) {
        // Hide pagination if only 1 page
        pagination.style.display = 'none';
        return;
      }

      // Previous button
      const prevBtn = document.createElement("button");
      prevBtn.textContent = "‹";
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => {
        if (currentPage > 1 && !_scrollLocked) {
          currentPage--;
          smoothScrollToTop(() => initGames(document.getElementById("searchInput").value));
        }
      };
      pagination.appendChild(prevBtn);

      // Calculate which 5 pages to show
      let startPage, endPage;
      
      if (totalPages <= 5) {
        // Show all pages if 5 or fewer
        startPage = 1;
        endPage = totalPages;
      } else {
        // Show 5 pages centered around current page
        startPage = Math.max(1, currentPage - 2);
        endPage = Math.min(totalPages, startPage + 4);
        
        // Adjust if we're near the end
        if (endPage === totalPages) {
          startPage = Math.max(1, totalPages - 4);
        }
      }

      // Add "..." before if not starting at page 1
      if (startPage > 1) {
        const ellipsis = document.createElement("span");
        ellipsis.className = "ellipsis";
        ellipsis.textContent = "...";
        pagination.appendChild(ellipsis);
      }

      // Show the 5 page buttons
      for (let page = startPage; page <= endPage; page++) {
        const btn = document.createElement("button");
        btn.textContent = page;
        btn.className = page === currentPage ? "active" : "";
        btn.onclick = () => {
          if (!_scrollLocked) {
            currentPage = page;
            smoothScrollToTop(() => initGames(document.getElementById("searchInput").value));
          }
        };
        pagination.appendChild(btn);
      }

      // Add "..." after if not ending at last page
      if (endPage < totalPages) {
        const ellipsis = document.createElement("span");
        ellipsis.className = "ellipsis";
        ellipsis.textContent = "...";
        pagination.appendChild(ellipsis);
      }

      // Next button
      const nextBtn = document.createElement("button");
      nextBtn.textContent = "›";
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => {
        if (currentPage < totalPages && !_scrollLocked) {
          currentPage++;
          smoothScrollToTop(() => initGames(document.getElementById("searchInput").value));
        }
      };
      pagination.appendChild(nextBtn);
    }

    // Intersection Observer for virtual scrolling
    const cardObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const card = entry.target;
          const img = card.querySelector('img');
          if (img && !img.dataset.loaded) {
            img.dataset.loaded = 'true';
          }
          visibleCards.add(card);
        } else {
          visibleCards.delete(entry.target);
        }
      });
    }, {
      root: null,
      rootMargin: '200px',
      threshold: 0.01
    });
    
    // render grid with fuzzy-ranked results
    function initGames(filter = "") {
      const grid = document.getElementById("gameGrid");
      grid.innerHTML = "";

      // Hide hero, sections & continue-playing on pages beyond the first
      const isFirstPage = currentPage === 1 && !filter.trim() && activeTags.size === 0;
      const _heroEl = document.getElementById('gamesHero');
      const _continueEl = document.getElementById('continuePlayingSection');
      const _scrollSections = document.getElementById('scrollableSections');
      const _favSection = document.getElementById('yourFavoritesSection');
      if (!isFirstPage) {
        // Save current display values before hiding
        if (_heroEl && !_heroEl.dataset.savedDisplay) _heroEl.dataset.savedDisplay = _heroEl.style.display;
        if (_continueEl && !_continueEl.dataset.savedDisplay) _continueEl.dataset.savedDisplay = _continueEl.style.display;
        if (_scrollSections && !_scrollSections.dataset.savedDisplay) _scrollSections.dataset.savedDisplay = _scrollSections.style.display;
        if (_favSection && !_favSection.dataset.savedDisplay) _favSection.dataset.savedDisplay = _favSection.style.display;
        if (_heroEl) _heroEl.style.display = 'none';
        if (_continueEl) _continueEl.style.display = 'none';
        if (_scrollSections) _scrollSections.style.display = 'none';
        if (_favSection) _favSection.style.display = 'none';
      } else {
        // Restore sections on first page
        if (_heroEl && _heroEl.dataset.savedDisplay !== undefined) { _heroEl.style.display = _heroEl.dataset.savedDisplay; delete _heroEl.dataset.savedDisplay; }
        if (_continueEl && _continueEl.dataset.savedDisplay !== undefined) { _continueEl.style.display = _continueEl.dataset.savedDisplay; delete _continueEl.dataset.savedDisplay; }
        if (_scrollSections && _scrollSections.dataset.savedDisplay !== undefined) { _scrollSections.style.display = _scrollSections.dataset.savedDisplay; delete _scrollSections.dataset.savedDisplay; }
        if (_favSection && _favSection.dataset.savedDisplay !== undefined) { _favSection.style.display = _favSection.dataset.savedDisplay; delete _favSection.dataset.savedDisplay; }
      }

      // Disconnect previous observers
      cardObserver.disconnect();
      visibleCards.clear();

      // Filter and sort games
      let gamesToShow = allGames;
      
      // Apply favorites filter
      if (currentFilter === 'favorites') {
        const favs = FavoritesManager.get();
        gamesToShow = allGames.filter(g => favs.includes(g.title));
      }
      
      // Apply tag filter
      if (activeTags.size > 0) {
        gamesToShow = gamesToShow.filter(g =>
          Array.isArray(g.tags) && [...activeTags].every(t => g.tags.includes(t))
        );
      }
      
      const candidates = gamesToShow.map(g => {
        const titleScore = fuzzyScore(filter.trim(), g.title || "");
        return { game: g, score: titleScore };
      })
      .filter(item => item.score !== -Infinity)
      .sort((a, b) => b.score - a.score);

      filteredGames = candidates;

      // Calculate pagination
      const totalGames = candidates.length;
      const startIndex = (currentPage - 1) * GAMES_PER_PAGE;
      const endIndex = Math.min(startIndex + GAMES_PER_PAGE, totalGames);
      const pageGames = candidates.slice(startIndex, endIndex);
      
      // ⚡ RENDER PAGINATION IMMEDIATELY - Don't wait for views
      renderPagination(totalGames);

      // Taboola: insert ad widgets every AD_INTERVAL cards
      const AD_INTERVAL = 12;
      let taboolaAdCount = 0;

      // Signal new page to Taboola BEFORE pushing any placements
      window._taboola = window._taboola || [];
      _taboola.push({notify: 'newPageLoad'});
      _taboola.push({article: 'auto', url: window.location.origin + window.location.pathname});

      function insertTaboolaAd() {
        window._taboolaGlobalIndex++;
        taboolaAdCount++;
        const adContainer = document.createElement('div');
        adContainer.className = 'taboola-ad-row';
        const adId = 'taboola-games-feed-' + window._taboolaGlobalIndex;
        adContainer.innerHTML = '<div id="' + adId + '"></div>';
        grid.appendChild(adContainer);

        window._taboola = window._taboola || [];
        _taboola.push({
          mode: 'alternating-thumbnails-a',
          container: adId,
          placement: 'Games Feed ' + window._taboolaGlobalIndex,
          target_type: 'mix'
        });
      }

      // Render games for current page
      pageGames.forEach((cand, index) => {
        // Insert a Taboola ad row after every AD_INTERVAL cards
        if (index > 0 && index % AD_INTERVAL === 0) {
          insertTaboolaAd();
        }

        const game = cand.game;
        const card = document.createElement("div");
        card.className = "game-card";
        card.style.setProperty("--card-index", index);
        card.onclick = () => {
          const newGameData = JSON.stringify(game);
          const currentGameData = sessionStorage.getItem("currentGame");
          
          console.log('Game card clicked:', game.title);
          console.log('Setting currentGame in sessionStorage:', newGameData);
          
          // Add to recently played
          RecentlyPlayedManager.add(game.title);
          
          // Check if this is a different game than what's currently loaded
          if (currentGameData !== newGameData) {
            // Destroy the old game session completely when selecting a new game
            if (typeof window.destroyGameSession === 'function') {
              window.destroyGameSession();
            } else if (window.GameStateManager) {
              window.GameStateManager.clearState();
              if (window.GameStateManager.clearDomState) {
                window.GameStateManager.clearDomState();
              }
            }
          }
          
          // Clear autoplay flag - only Continue button should trigger autoplay
          if (window.GameStateManager) {
            window.GameStateManager.setAutoplay(false);
          }
          
          sessionStorage.setItem("currentGame", newGameData);
          
          // Verify it was saved
          const saved = sessionStorage.getItem("currentGame");
          console.log('Verified sessionStorage:', saved ? 'saved successfully' : 'FAILED TO SAVE');
          
          // keep your existing navigation behavior
          if (typeof navigate === 'function') {
            console.log('Using navigate function to /loader');
            navigate('/loader');
          } else {
            // fallback: try location change if navigate not defined
            console.log('navigate function not found, using location.href');
            try { 
              location.href = 'gameloader.html'; 
            } catch (e) {
              console.error('Navigation failed:', e);
            }
          }
        };

        const img   = document.createElement("img");
        img.src     = game.thumbnail;
        img.alt     = game.title;
        img.loading = "lazy";
        img.decoding = "async";

        const title = document.createElement("div");
        title.className   = "game-title";
        title.textContent = game.title;

        // Favorite star
        const star = document.createElement("div");
        star.className = "favorite-star" + (FavoritesManager.isFavorited(game.title) ? " favorited" : "");
        star.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
        star.onclick = (e) => {
          e.stopPropagation();
          const isFav = FavoritesManager.toggle(game.title);
          star.classList.toggle('favorited', isFav);
          // If viewing favorites and unfavorited, refresh the view
          if (currentFilter === 'favorites' && !isFav) {
            initGames(document.getElementById("searchInput").value);
          }
        };
        
        // View count badge
        const viewCount = document.createElement("div");
        viewCount.className = "view-count";
        const count = viewsCache[game.title] || 0;
        viewCount.innerHTML = `<i class="fas fa-eye"></i><span>${ViewsAPI.formatCount(count)}</span>`;
        viewCount.style.opacity = count > 0 ? '1' : '0.5';

        card.appendChild(img);
        card.appendChild(title);
        card.appendChild(star);
        card.appendChild(viewCount);
        
        // Add tag badges (show first 2 tags)
        if (Array.isArray(game.tags) && game.tags.length > 0) {
          const tagsDiv = document.createElement('div');
          tagsDiv.className = 'game-card-tags';
          game.tags.slice(0, 2).forEach(t => {
            const badge = document.createElement('span');
            badge.className = 'game-card-tag';
            badge.textContent = t;
            tagsDiv.appendChild(badge);
          });
          card.appendChild(tagsDiv);
        }
        
        grid.appendChild(card);

        bindCardHighlight(card);
        
        // Observe card for virtual scrolling
        cardObserver.observe(card);
      });
      
      // ⚡ Use cached view counts immediately - no async update needed
      if (pageGames.length > 0) {
        const gameIds = pageGames.map(c => c.game.title);
        const missingIds = gameIds.filter(id => typeof viewsCache[id] === 'undefined');
        
        // Only fetch if we have games without cached counts
        if (missingIds.length > 0) {
          ViewsAPI.fetchBatch(missingIds).then(views => {
            Object.assign(viewsCache, views);
            persistViewsCache();
            
            // Update ALL cards on the current page with the new view counts
            const cards = grid.querySelectorAll('.game-card');
            pageGames.forEach((cand, index) => {
              const count = viewsCache[cand.game.title] || 0;
              if (cards[index]) {
                const viewCountEl = cards[index].querySelector('.view-count span');
                const viewCountDiv = cards[index].querySelector('.view-count');
                if (viewCountEl) {
                  viewCountEl.textContent = ViewsAPI.formatCount(count);
                }
                if (viewCountDiv) {
                  viewCountDiv.style.opacity = count > 0 ? '1' : '0.5';
                }
              }
            });
          }).catch(error => {
            console.error('Failed to load view counts:', error);
          });
        }
      }

      // Flush Taboola placements
      if (taboolaAdCount > 0) {
        window._taboola = window._taboola || [];
        _taboola.push({flush: true});
      }

      // Show no results message
      if (filter && candidates.length === 0) {
        const noCard = document.createElement("div");
        noCard.className = "no-results";
        noCard.textContent = `No results for "${filter}"`;
        grid.appendChild(noCard);
      }
    }

    // wire input (trimmed) with debounce
    const inputEl = document.getElementById("searchInput");
    const debouncedSearch = debounce((value) => {
      currentPage = 1; // Reset to first page on search
      initGames(value);
    }, 300);
    
    const inputHandler = e => {
      debouncedSearch(e.target.value);
    };
    
    const keydownHandler = e => {
      if (e.key === 'Escape') {
        inputEl.value = '';
        initGames('');
        inputEl.blur();
      }
    };
    
    inputEl.addEventListener("input", inputHandler);
    inputEl.addEventListener("keydown", keydownHandler);
    
    registerCleanup(() => {
      inputEl.removeEventListener("input", inputHandler);
      inputEl.removeEventListener("keydown", keydownHandler);
    });

    // Filter tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {

        currentPage = 1;
        initGames(document.getElementById('searchInput').value);
      });

    // initial render
    initGames();
    
    // Continue Playing feature
    function initContinuePlaying() {
      const section = document.getElementById('continuePlayingSection');
      const card = document.getElementById('continuePlayingCard');
      const thumbnail = document.getElementById('continueGameThumbnail');
      const titleEl = document.getElementById('continueGameTitle');
      const closeBtn = document.getElementById('continuePlayingClose');
      
      if (!section || !window.GameStateManager) return;
      
      const state = window.GameStateManager.getState();
      
      if (state && state.game && state.isPlaying) {
        // Show the continue playing section
        section.style.display = 'flex';
        thumbnail.src = state.game.thumbnail || '';
        thumbnail.alt = state.game.title || '';
        titleEl.textContent = state.game.title || 'Unknown Game';
        
        // Click to continue playing
        card.onclick = (e) => {
          if (e.target.closest('.continue-playing-close')) return;
          
          sessionStorage.setItem('currentGame', JSON.stringify(state.game));
          
          const needsAutoplay = !(window.GameStateManager && window.GameStateManager.hasDom && window.GameStateManager.hasDom());
          if (window.GameStateManager) {
            window.GameStateManager.setAutoplay(needsAutoplay);
          }
          
          if (typeof navigate === 'function') {
            navigate('/loader');
          } else {
            location.href = 'gameloader.html';
          }
        };
        
        // Close button to dismiss and terminate session
        closeBtn.onclick = (e) => {
          e.stopPropagation();
          if (typeof window.destroyGameSession === 'function') {
            window.destroyGameSession();
          } else if (window.GameStateManager) {
            window.GameStateManager.clearState();
            if (window.GameStateManager.clearDomState) {
              window.GameStateManager.clearDomState();
            }
          }
          section.style.display = 'none';
        };
      } else {
        section.style.display = 'none';
      }
    }
    
    initContinuePlaying();
  })();
  </script>

</body>
</html>
